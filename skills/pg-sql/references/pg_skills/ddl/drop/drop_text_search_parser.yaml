skillid: pg_drop_text_search_parser
name: DROP TEXT SEARCH PARSER
category: DDL
subcategory: drop

description:
  brief: "删除一个文本搜索解析器"

syntax:
  primary: "DROP TEXT SEARCH PARSER [ IF EXISTS ] name [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果解析器不存在"
  - name: "name"
    description: "要删除的文本搜索解析器的名称"
  - name: "CASCADE"
    description: "自动删除依赖该解析器的文本搜索配置"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "必须是超级用户才能删除文本搜索解析器"

related_commands:
  - skillid: pg_create_text_search_parser
  - skillid: pg_alter_text_search_parser

metadata:
  source_page: 1889
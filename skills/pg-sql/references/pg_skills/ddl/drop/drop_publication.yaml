skillid: pg_drop_publication
name: DROP PUBLICATION
category: DDL
subcategory: drop

description:
  brief: "删除一个发布"

syntax:
  primary: "DROP PUBLICATION [ IF EXISTS ] name [, ...] [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果发布不存在"
  - name: "name"
    description: "要删除的发布的名称（可指定多个）"
  - name: "CASCADE"
    description: "此选项对发布无实际效果"
  - name: "RESTRICT"
    description: "此选项对发布无实际效果，是默认行为"

notes:
  - "只有发布的拥有者或超级用户才能删除发布"

related_commands:
  - skillid: pg_create_publication
  - skillid: pg_alter_publication

metadata:
  source_page: 1874
skillid: pg_drop_function
name: DROP FUNCTION
category: DDL
subcategory: drop

description:
  brief: "Remove a function"
  detailed: "DROP FUNCTION removes an existing function. Must specify argument types to identify correct function."

syntax:
  primary: "DROP FUNCTION [ IF EXISTS ] name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ] [, ...] [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "Do not error if function doesn't exist"
  - name: "argtype"
    description: "Argument types to identify overloaded function"
  - name: "CASCADE"
    description: "Automatically drop dependent objects"

related_commands:
  - skillid: pg_create_function
  - skillid: pg_alter_function
  - skillid: pg_drop_routine

metadata:
  source_page: 1857
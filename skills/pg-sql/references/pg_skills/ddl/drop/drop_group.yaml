skillid: pg_drop_group
name: DROP GROUP
category: DDL
subcategory: drop

description:
  brief: "删除一个数据库角色"

syntax:
  primary: "DROP GROUP [ IF EXISTS ] name [, ...]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果角色不存在"
  - name: "name"
    description: "要删除的角色名称（可指定多个）"

notes:
  - "DROP GROUP 现在是 DROP ROLE 的别名"

related_commands:
  - skillid: pg_drop_role
  - skillid: pg_create_role

metadata:
  source_page: 1859
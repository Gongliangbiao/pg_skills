skillid: pg_drop_user
name: DROP USER
category: DDL
subcategory: drop

description:
  brief: "删除一个数据库角色"

syntax:
  primary: "DROP USER [ IF EXISTS ] name [, ...]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果用户不存在"
  - name: "name"
    description: "要删除的用户名称（可指定多个）"

notes:
  - "DROP USER 是 DROP ROLE 的替代写法"

related_commands:
  - skillid: pg_drop_role
  - skillid: pg_create_role

metadata:
  source_page: 1894
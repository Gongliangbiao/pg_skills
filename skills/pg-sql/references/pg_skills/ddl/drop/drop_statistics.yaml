skillid: pg_drop_statistics
name: DROP STATISTICS
category: DDL
subcategory: drop

description:
  brief: "删除扩展统计对象"

syntax:
  primary: "DROP STATISTICS [ IF EXISTS ] name [, ...] [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果统计对象不存在"
  - name: "name"
    description: "要删除的统计对象的名称（可指定多个，可包含模式名）"
  - name: "CASCADE"
    description: "此选项对统计对象无实际效果"
  - name: "RESTRICT"
    description: "此选项对统计对象无实际效果，是默认行为"

notes:
  - "只有统计对象的拥有者、模式的拥有者或超级用户才能删除统计对象"

related_commands:
  - skillid: pg_create_statistics
  - skillid: pg_alter_statistics

metadata:
  source_page: 1882
skillid: pg_drop_server
name: DROP SERVER
category: DDL
subcategory: drop

description:
  brief: "删除一个外部服务器描述符"

syntax:
  primary: "DROP SERVER [ IF EXISTS ] name [, ...] [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果服务器不存在"
  - name: "name"
    description: "要删除的外部服务器的名称（可指定多个）"
  - name: "CASCADE"
    description: "自动删除依赖该服务器的外部表和用户映射"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "要执行此命令，当前用户必须是服务器的拥有者"

related_commands:
  - skillid: pg_create_server
  - skillid: pg_alter_server

metadata:
  source_page: 1881
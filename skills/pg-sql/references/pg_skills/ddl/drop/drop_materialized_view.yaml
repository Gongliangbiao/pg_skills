skillid: pg_drop_materialized_view
name: DROP MATERIALIZED VIEW
category: DDL
subcategory: drop

description:
  brief: "删除一个物化视图"

syntax:
  primary: "DROP MATERIALIZED VIEW [ IF EXISTS ] name [, ...] [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果物化视图不存在"
  - name: "name"
    description: "要删除的物化视图的名称（可指定多个）"
  - name: "CASCADE"
    description: "自动删除依赖该物化视图的对象"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "要执行此命令，必须是物化视图的拥有者"

related_commands:
  - skillid: pg_create_materialized_view
  - skillid: pg_alter_materialized_view
  - skillid: pg_refresh_materialized_view

metadata:
  source_page: 1863
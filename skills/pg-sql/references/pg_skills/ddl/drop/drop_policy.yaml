skillid: pg_drop_policy
name: DROP POLICY
category: DDL
subcategory: drop

description:
  brief: "从表中删除行级安全策略"

syntax:
  primary: "DROP POLICY [ IF EXISTS ] name ON table_name [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果策略不存在"
  - name: "name"
    description: "要删除的策略的名称"
  - name: "table_name"
    description: "策略所在表的名称"
  - name: "CASCADE"
    description: "此选项对策略无实际效果"
  - name: "RESTRICT"
    description: "此选项对策略无实际效果，是默认行为"

notes:
  - "如果删除表上最后一个策略且表仍启用了行级安全，将使用默认拒绝策略"
  - "使用ALTER TABLE ... DISABLE ROW LEVEL SECURITY可禁用行级安全"

related_commands:
  - skillid: pg_create_policy
  - skillid: pg_alter_policy

metadata:
  source_page: 1871
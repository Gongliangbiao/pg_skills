skillid: pg_drop_conversion
name: DROP CONVERSION
category: DDL
subcategory: drop

description:
  brief: "删除一个编码转换"

syntax:
  primary: "DROP CONVERSION [ IF EXISTS ] name [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果转换不存在"
  - name: "name"
    description: "要删除的转换的名称"
  - name: "CASCADE"
    description: "自动删除依赖该转换的对象"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "要删除转换，必须拥有该转换"

related_commands:
  - skillid: pg_create_conversion
  - skillid: pg_alter_conversion

metadata:
  source_page: 1850
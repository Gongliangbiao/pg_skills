skillid: pg_drop_type
name: DROP TYPE
category: DDL
subcategory: drop

description:
  brief: "删除一个数据类型"

syntax:
  primary: "DROP TYPE [ IF EXISTS ] name [, ...] [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果类型不存在"
  - name: "name"
    description: "要删除的数据类型的名称（可指定多个）"
  - name: "CASCADE"
    description: "自动删除依赖该类型的对象（如使用该类型的表列、函数等）"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "只有类型的拥有者才能删除类型"

related_commands:
  - skillid: pg_create_type
  - skillid: pg_alter_type

metadata:
  source_page: 1893
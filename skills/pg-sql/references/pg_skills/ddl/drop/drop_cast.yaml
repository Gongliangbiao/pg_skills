skillid: pg_drop_cast
name: DROP CAST
category: DDL
subcategory: drop

description:
  brief: "删除一个类型转换"

syntax:
  primary: "DROP CAST [ IF EXISTS ] (source_type AS target_type) [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果类型转换不存在"
  - name: "source_type"
    description: "转换源数据类型的名称"
  - name: "target_type"
    description: "转换目标数据类型的名称"
  - name: "CASCADE"
    description: "自动删除依赖该转换的对象"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "要删除类型转换，必须拥有源或目标数据类型"

related_commands:
  - skillid: pg_create_cast

metadata:
  source_page: 1848
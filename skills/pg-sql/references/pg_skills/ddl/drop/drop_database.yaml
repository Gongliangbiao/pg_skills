skillid: pg_drop_database
name: DROP DATABASE
category: DDL
subcategory: drop

description:
  brief: "Remove a database"
  detailed: "DROP DATABASE removes a database. It cannot be undone. Active connections must be terminated first."

syntax:
  primary: "DROP DATABASE [ IF EXISTS ] name"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "Do not error if database doesn't exist"
  - name: "name"
    description: "Database name to remove"

warnings:
  - "Cannot be undone"
  - "Cannot drop database with active connections"

related_commands:
  - skillid: pg_create_database
  - skillid: pg_alter_database

metadata:
  source_page: 1851
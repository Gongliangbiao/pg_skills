skillid: pg_drop_operator_class
name: DROP OPERATOR CLASS
category: DDL
subcategory: drop

description:
  brief: "删除一个运算符类"

syntax:
  primary: "DROP OPERATOR CLASS [ IF EXISTS ] name USING index_method [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果运算符类不存在"
  - name: "name"
    description: "要删除的运算符类的名称"
  - name: "index_method"
    description: "索引方法的名称（如btree、hash等）"
  - name: "CASCADE"
    description: "自动删除依赖该运算符类的对象（如使用该运算符类的索引）"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "必须拥有运算符类才能删除它"
  - "DROP OPERATOR CLASS不会删除运算符类所属的运算符族"
  - "如果想同时删除空的运算符族，应使用DROP OPERATOR FAMILY"

related_commands:
  - skillid: pg_create_operator_class
  - skillid: pg_alter_operator_class
  - skillid: pg_drop_operator_family

metadata:
  source_page: 1866
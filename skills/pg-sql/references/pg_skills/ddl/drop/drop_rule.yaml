skillid: pg_drop_rule
name: DROP RULE
category: DDL
subcategory: drop

description:
  brief: "删除一个重写规则"

syntax:
  primary: "DROP RULE [ IF EXISTS ] name ON table_name [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果规则不存在"
  - name: "name"
    description: "要删除的规则的名称"
  - name: "table_name"
    description: "规则所在表的名称"
  - name: "CASCADE"
    description: "自动删除依赖该规则的对象"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

related_commands:
  - skillid: pg_create_rule
  - skillid: pg_alter_rule

metadata:
  source_page: 1878
skillid: pg_drop_access_method
name: DROP ACCESS METHOD
category: DDL
subcategory: drop

description:
  brief: "删除现有的访问方法"

syntax:
  primary: "DROP ACCESS METHOD [ IF EXISTS ] name [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果访问方法不存在"
  - name: "name"
    description: "要删除的访问方法的名称"
  - name: "CASCADE"
    description: "自动删除依赖该访问方法的对象"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

related_commands:
  - skillid: pg_create_access_method

metadata:
  source_page: 1845
skillid: pg_drop_text_search_template
name: DROP TEXT SEARCH TEMPLATE
category: DDL
subcategory: drop

description:
  brief: "删除一个文本搜索模板"

syntax:
  primary: "DROP TEXT SEARCH TEMPLATE [ IF EXISTS ] name [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果模板不存在"
  - name: "name"
    description: "要删除的文本搜索模板的名称"
  - name: "CASCADE"
    description: "自动删除依赖该模板的文本搜索字典"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "必须是超级用户才能删除文本搜索模板"

related_commands:
  - skillid: pg_create_text_search_template
  - skillid: pg_alter_text_search_template

metadata:
  source_page: 1890
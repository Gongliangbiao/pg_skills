skillid: pg_drop_foreign_data_wrapper
name: DROP FOREIGN DATA WRAPPER
category: DDL
subcategory: drop

description:
  brief: "删除一个外部数据包装器"

syntax:
  primary: "DROP FOREIGN DATA WRAPPER [ IF EXISTS ] name [, ...] [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果外部数据包装器不存在"
  - name: "name"
    description: "要删除的外部数据包装器的名称（可指定多个）"
  - name: "CASCADE"
    description: "自动删除依赖该外部数据包装器的对象"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "要执行此命令，当前用户必须是外部数据包装器的拥有者"

related_commands:
  - skillid: pg_create_foreign_data_wrapper
  - skillid: pg_alter_foreign_data_wrapper

metadata:
  source_page: 1855
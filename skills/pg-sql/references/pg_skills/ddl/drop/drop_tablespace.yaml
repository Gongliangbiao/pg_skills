skillid: pg_drop_tablespace
name: DROP TABLESPACE
category: DDL
subcategory: drop

description:
  brief: "删除一个表空间"

syntax:
  primary: "DROP TABLESPACE [ IF EXISTS ] name"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果表空间不存在"
  - name: "name"
    description: "要删除的表空间的名称"

notes:
  - "只有表空间的拥有者或超级用户才能删除表空间"
  - "表空间必须为空才能删除"
  - "其他数据库中的对象可能仍在使用该表空间"
  - "不能在事务块内执行DROP TABLESPACE"

related_commands:
  - skillid: pg_create_tablespace
  - skillid: pg_alter_tablespace

metadata:
  source_page: 1886
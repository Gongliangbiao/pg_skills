skillid: pg_drop_sequence
name: DROP SEQUENCE
category: DDL
subcategory: drop

description:
  brief: "删除一个序列"

syntax:
  primary: "DROP SEQUENCE [ IF EXISTS ] name [, ...] [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果序列不存在"
  - name: "name"
    description: "要删除的序列的名称（可指定多个）"
  - name: "CASCADE"
    description: "自动删除依赖该序列的对象"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "只有序列的拥有者或超级用户才能删除序列"

related_commands:
  - skillid: pg_create_sequence
  - skillid: pg_alter_sequence

metadata:
  source_page: 1880
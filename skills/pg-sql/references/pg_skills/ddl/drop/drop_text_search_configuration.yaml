skillid: pg_drop_text_search_configuration
name: DROP TEXT SEARCH CONFIGURATION
category: DDL
subcategory: drop

description:
  brief: "删除一个文本搜索配置"

syntax:
  primary: "DROP TEXT SEARCH CONFIGURATION [ IF EXISTS ] name [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果配置不存在"
  - name: "name"
    description: "要删除的文本搜索配置的名称"
  - name: "CASCADE"
    description: "自动删除依赖该配置的对象（如使用to_tsvector调用该配置的索引）"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "必须拥有该配置才能删除它"

related_commands:
  - skillid: pg_create_text_search_configuration
  - skillid: pg_alter_text_search_configuration

metadata:
  source_page: 1887
skillid: pg_drop_foreign_table
name: DROP FOREIGN TABLE
category: DDL
subcategory: drop

description:
  brief: "删除一个外部表"

syntax:
  primary: "DROP FOREIGN TABLE [ IF EXISTS ] name [, ...] [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果外部表不存在"
  - name: "name"
    description: "要删除的外部表的名称（可指定多个）"
  - name: "CASCADE"
    description: "自动删除依赖该外部表的对象"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "只有外部表的拥有者才能删除它"

related_commands:
  - skillid: pg_create_foreign_table
  - skillid: pg_alter_foreign_table

metadata:
  source_page: 1856
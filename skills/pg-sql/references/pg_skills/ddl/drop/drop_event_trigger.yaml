skillid: pg_drop_event_trigger
name: DROP EVENT TRIGGER
category: DDL
subcategory: drop

description:
  brief: "删除一个事件触发器"

syntax:
  primary: "DROP EVENT TRIGGER [ IF EXISTS ] name [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果事件触发器不存在"
  - name: "name"
    description: "要删除的事件触发器的名称"
  - name: "CASCADE"
    description: "自动删除依赖该触发器的对象"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "要执行此命令，当前用户必须是事件触发器的拥有者"

related_commands:
  - skillid: pg_create_event_trigger
  - skillid: pg_alter_event_trigger

metadata:
  source_page: 1853
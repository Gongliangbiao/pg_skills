skillid: pg_drop_routine
name: DROP ROUTINE
category: DDL
subcategory: drop

description:
  brief: "删除一个或多个例程（包括聚合函数、普通函数和存储过程）"

syntax:
  primary: "DROP ROUTINE [ IF EXISTS ] name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ] [, ...] [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "IF EXISTS"
    pg_specific: true
    description: "不报错如果例程不存在"
  - name: "name"
    description: "要删除的例程的名称（可指定多个）"
  - name: "argmode"
    description: "参数模式：IN、OUT、INOUT或VARIADIC"
  - name: "argname"
    description: "参数名称"
  - name: "argtype"
    description: "例程参数的数据类型"
  - name: "CASCADE"
    description: "自动删除依赖该例程的对象"
  - name: "RESTRICT"
    description: "如果有依赖对象则拒绝删除，这是默认行为"

notes:
  - "例程包括聚合函数、普通函数和存储过程"
  - "查找规则与DROP PROCEDURE相同"
  - "当同名例程有不同类型时可能出现歧义错误"

related_commands:
  - skillid: pg_drop_aggregate
  - skillid: pg_drop_function
  - skillid: pg_drop_procedure
  - skillid: pg_alter_routine

metadata:
  source_page: 1876
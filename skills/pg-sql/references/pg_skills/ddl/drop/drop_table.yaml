skillid: "ddl_drop_table"
name: "DROP TABLE"
category: "DDL"
subcategory: "DROP"
description: |
  DROP TABLE removes tables from the database. Only the table owner, the schema owner, and superuser can drop a table. To empty a table of rows without destroying the table, use DELETE or TRUNCATE.

  DROP TABLE always removes any indexes, rules, triggers, and constraints that exist for the target table. However, to drop a table that is referenced by a view or a foreign-key constraint of another table, CASCADE must be specified. (CASCADE will remove a dependent view entirely, but in the foreign-key case it will only remove the foreign-key constraint, not the other table entirely.)

syntax:
  template: "DROP TABLE [ IF EXISTS ] name [, ...] [ CASCADE | RESTRICT ]"
  breakdown:
    - component: "DROP TABLE"
      description: "Required keywords to initiate table removal"
    - component: "IF EXISTS"
      description: "Optional. Do not throw an error if the table does not exist. A notice is issued in this case."
    - component: "name"
      description: "The name (optionally schema-qualified) of the table to drop. Multiple tables can be specified separated by commas."
    - component: "CASCADE"
      description: "Optional. Automatically drop objects that depend on the table (such as views), and in turn all objects that depend on those objects."
    - component: "RESTRICT"
      description: "Optional. Refuse to drop the table if any objects depend on it. This is the default behavior."

key_parameters:
  - name: "IF EXISTS"
    type: "clause"
    required: false
    description: "Do not throw an error if the table does not exist. A notice is issued in this case."
  - name: "name"
    type: "identifier"
    required: true
    description: "The name (optionally schema-qualified) of the table to drop. Multiple table names can be specified separated by commas."
  - name: "CASCADE"
    type: "keyword"
    required: false
    default: "RESTRICT"
    description: "Automatically drop objects that depend on the table (such as views), and in turn all objects that depend on those objects."
  - name: "RESTRICT"
    type: "keyword"
    required: false
    default: true
    description: "Refuse to drop the table if any objects depend on it. This is the default behavior."

examples:
  - description: "Drop two tables, films and distributors"
    code: "DROP TABLE films, distributors;"
    explanation: "Destroys both the films and distributors tables in a single command."
  - description: "Drop a table if it exists"
    code: "DROP TABLE IF EXISTS my_table;"
    explanation: "Drops my_table only if it exists, avoiding an error if the table is already removed."
  - description: "Drop a table with dependent objects"
    code: "DROP TABLE products CASCADE;"
    explanation: "Drops the products table along with any dependent objects such as views or foreign key constraints."

permissions:
  - "Table owner"
  - "Schema owner"
  - "Superuser"

behavior:
  removes_objects:
    - "Indexes on the table"
    - "Rules on the table"
    - "Triggers on the table"
    - "Constraints on the table"
  cascade_effects:
    - "Dependent views are removed entirely"
    - "Foreign key constraints referencing the table are removed (but not the other table)"

compatibility: |
  This command conforms to the SQL standard, except that the standard only allows one table to be dropped per command, and apart from the IF EXISTS option, which is a PostgreSQL extension.

related_commands:
  - "ALTER TABLE"
  - "CREATE TABLE"
  - "DELETE"
  - "TRUNCATE"

metadata:
  source: "PostgreSQL Official Documentation"
  version: "PostgreSQL 17"
  extracted_from: "_full_extracted.txt"

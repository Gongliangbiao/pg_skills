skillid: pg_drop_owned
name: DROP OWNED
category: DDL
subcategory: drop

description:
  brief: "删除数据库角色拥有的数据库对象"

syntax:
  primary: "DROP OWNED BY { name | CURRENT_ROLE | CURRENT_USER | SESSION_USER } [, ...] [ CASCADE | RESTRICT ]"

key_parameters:
  - name: "name"
    description: "要删除其拥有对象的角色的名称"
  - name: "CURRENT_ROLE"
    pg_specific: true
    description: "删除当前角色拥有的对象"
  - name: "CURRENT_USER"
    description: "删除当前用户拥有的对象"
  - name: "SESSION_USER"
    description: "删除会话用户拥有的对象"
  - name: "CASCADE"
    description: "自动删除依赖被删除对象的其他对象"
  - name: "RESTRICT"
    description: "如果有其他对象依赖于被删除对象则拒绝删除，这是默认行为"

notes:
  - "DROP OWNED常用于准备删除一个或多个角色"
  - "只影响当前数据库中的对象，需要在每个数据库中执行"
  - "也会撤销指定角色在当前数据库或共享对象上的权限"
  - "不会删除角色拥有的数据库和表空间"

related_commands:
  - skillid: pg_drop_role
  - skillid: pg_reassign_owned

metadata:
  source_page: 1870
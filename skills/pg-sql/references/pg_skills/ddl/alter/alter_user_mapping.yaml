skillid: pg_alter_user_mapping
name: ALTER USER MAPPING
category: DDL
subcategory: alter

description:
  brief: "修改用户映射的定义，更改外部服务器用户映射的选项"

syntax:
  primary: "ALTER USER MAPPING FOR { user_name | USER | CURRENT_ROLE | CURRENT_USER | SESSION_USER | PUBLIC }\n    SERVER server_name\n    OPTIONS ( [ ADD | SET | DROP ] option ['value'] [, ... ] )"

key_parameters:
  - name: user_name
    description: "映射的用户名，PUBLIC匹配所有用户"
  - name: server_name
    description: "用户映射的服务器名称"
  - name: OPTIONS
    description: "用户映射的选项，ADD添加、SET设置、DROP删除"

related_commands:
  - CREATE USER MAPPING
  - DROP USER MAPPING

metadata:
  source_page: 1632
  doc_version: "PostgreSQL 16.4"
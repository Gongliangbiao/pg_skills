skillid: pg_alter_text_search_parser
name: ALTER TEXT SEARCH PARSER
category: DDL
subcategory: alter

description:
  brief: "修改文本搜索解析器的定义，目前仅支持更改名称和模式"

syntax:
  primary: "ALTER TEXT SEARCH PARSER name RENAME TO new_name\nALTER TEXT SEARCH PARSER name SET SCHEMA new_schema"

key_parameters:
  - name: name
    description: "现有文本搜索解析器的名称（可选模式限定）"
  - name: new_name
    description: "解析器的新名称"
  - name: new_schema
    description: "解析器的新模式"

related_commands:
  - CREATE TEXT SEARCH PARSER
  - DROP TEXT SEARCH PARSER

metadata:
  source_page: 1622
  doc_version: "PostgreSQL 16.4"
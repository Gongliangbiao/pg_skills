skillid: pg_alter_text_search_dictionary
name: ALTER TEXT SEARCH DICTIONARY
category: DDL
subcategory: alter

description:
  brief: "修改文本搜索字典的定义，包括模板特定选项、名称、所有者和模式"

syntax:
  primary: "ALTER TEXT SEARCH DICTIONARY name (\n    option [ = value ] [, ... ]\n)\nALTER TEXT SEARCH DICTIONARY name RENAME TO new_name\nALTER TEXT SEARCH DICTIONARY name OWNER TO { new_owner | CURRENT_ROLE | CURRENT_USER | SESSION_USER }\nALTER TEXT SEARCH DICTIONARY name SET SCHEMA new_schema"

key_parameters:
  - name: name
    description: "现有文本搜索字典的名称（可选模式限定）"
  - name: option
    description: "模板特定选项名称"
  - name: value
    description: "选项的新值，省略等号和值则删除该选项"
  - name: new_name
    description: "字典的新名称"
  - name: new_owner
    description: "字典的新所有者"
  - name: new_schema
    description: "字典的新模式"

related_commands:
  - CREATE TEXT SEARCH DICTIONARY
  - DROP TEXT SEARCH DICTIONARY

metadata:
  source_page: 1620
  doc_version: "PostgreSQL 16.4"
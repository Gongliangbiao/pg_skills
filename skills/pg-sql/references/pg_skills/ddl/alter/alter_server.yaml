skillid: pg_alter_server
name: ALTER SERVER
category: DDL
subcategory: alter

description:
  brief: "修改外部服务器的定义，包括版本、选项、所有者和名称"

syntax:
  primary: "ALTER SERVER name [ VERSION 'new_version' ]\n    [ OPTIONS ( [ ADD | SET | DROP ] option ['value'] [, ... ] ) ]\nALTER SERVER name OWNER TO { new_owner | CURRENT_ROLE | CURRENT_USER | SESSION_USER }\nALTER SERVER name RENAME TO new_name"

key_parameters:
  - name: name
    description: "现有外部服务器的名称"
  - name: new_version
    description: "新的服务器版本"
  - name: OPTIONS
    description: "服务器选项，ADD添加、SET设置、DROP删除"
  - name: new_owner
    description: "服务器的新所有者"
  - name: new_name
    description: "服务器的新名称"

related_commands:
  - CREATE SERVER
  - DROP SERVER

metadata:
  source_page: 1590
  doc_version: "PostgreSQL 16.4"
skillid: pg_alter_role
name: ALTER ROLE
category: DDL
subcategory: alter

description:
  brief: "Change a database role"
  detailed: "ALTER ROLE modifies attributes of a database role."

syntax:
  primary: |
    ALTER ROLE name [ [ WITH ] option [ ... ] ]
    ALTER ROLE name RENAME TO new_name
    ALTER ROLE name SET configuration_parameter { TO | = } { value | DEFAULT }
    ALTER ROLE name RESET configuration_parameter

key_parameters:
  - name: "option"
    description: "Role attributes (SUPERUSER, LOGIN, etc.)"
  - name: "RENAME TO"
    pg_specific: true
    description: "Rename role"
  - name: "SET/RESET"
    pg_specific: true
    description: "Set role-specific configuration"

related_commands:
  - skillid: pg_create_role
  - skillid: pg_drop_role

metadata:
  source_page: 1579
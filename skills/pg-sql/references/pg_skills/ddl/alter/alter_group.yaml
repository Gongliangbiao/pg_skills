skillid: pg_alter_group
name: ALTER GROUP
category: DDL
subcategory: alter

description:
  brief: "Change role name or membership"
  detailed: |
    ALTER GROUP changes the attributes of a user group.
    This is an obsolete command, though still accepted for backwards compatibility,
    because groups (and users too) have been superseded by the more general concept of roles.
    The first two variants add users to a group or remove them from a group.
    The third variant changes the name of the group.
    These operations are effectively equivalent to GRANT/REVOKE membership or ALTER ROLE.

syntax:
  primary: |
    ALTER GROUP role_specification ADD USER user_name [, ... ]
    ALTER GROUP role_specification DROP USER user_name [, ... ]
    ALTER GROUP group_name RENAME TO new_name

    where role_specification can be:
        role_name
      | CURRENT_ROLE
      | CURRENT_USER
      | SESSION_USER

key_parameters:
  - name: "group_name"
    description: "The name of the group (role) to modify"
    pg_specific: true
  - name: "user_name"
    description: "Users (roles) that are to be added to or removed from the group"
    pg_specific: true
  - name: "new_name"
    description: "The new name of the group"
    pg_specific: false

notes:
  - "This is an obsolete command - use GRANT/REVOKE or ALTER ROLE instead"
  - "ALTER GROUP does not create or drop users - they must already exist"

related_commands:
  - skillid: pg_grant
  - skillid: pg_revoke
  - skillid: pg_alter_role

metadata:

skillid: pg_alter_statistics
name: ALTER STATISTICS
category: DDL
subcategory: alter

description:
  brief: "修改扩展统计对象的定义，包括所有者、名称、模式和统计目标"

syntax:
  primary: "ALTER STATISTICS name OWNER TO { new_owner | CURRENT_ROLE | CURRENT_USER | SESSION_USER }\nALTER STATISTICS name RENAME TO new_name\nALTER STATISTICS name SET SCHEMA new_schema\nALTER STATISTICS name SET STATISTICS new_target"

key_parameters:
  - name: name
    description: "要修改的统计对象名称（可选模式限定）"
  - name: new_owner
    description: "统计对象的新所有者"
  - name: new_name
    description: "统计对象的新名称"
  - name: new_schema
    description: "统计对象的新模式"
  - name: new_target
    description: "统计收集目标，范围0-10000，-1恢复使用引用列的最大统计目标"

related_commands:
  - CREATE STATISTICS
  - DROP STATISTICS

metadata:
  source_page: 1592
  doc_version: "PostgreSQL 16.4"
skillid: pg_alter_routine
name: ALTER ROUTINE
category: DDL
subcategory: alter

description:
  brief: "修改例程的定义，例程可以是聚合函数、普通函数或存储过程"

syntax:
  primary: "ALTER ROUTINE name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ]\n    action [ ... ] [ RESTRICT ]\nALTER ROUTINE name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ]\n    RENAME TO new_name\nALTER ROUTINE name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ]\n    OWNER TO { new_owner | CURRENT_ROLE | CURRENT_USER | SESSION_USER }\nALTER ROUTINE name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ]\n    SET SCHEMA new_schema\nALTER ROUTINE name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ]\n    [ NO ] DEPENDS ON EXTENSION extension_name\n\nwhere action is one of:\n    IMMUTABLE | STABLE | VOLATILE\n    [ NOT ] LEAKPROOF\n    [ EXTERNAL ] SECURITY INVOKER | [ EXTERNAL ] SECURITY DEFINER\n    PARALLEL { UNSAFE | RESTRICTED | SAFE }\n    COST execution_cost\n    ROWS result_rows\n    SET configuration_parameter { TO | = } { value | DEFAULT }\n    SET configuration_parameter FROM CURRENT\n    RESET configuration_parameter\n    RESET ALL"

key_parameters:
  - name: name
    description: "现有例程的名称"
  - name: argtype
    description: "参数的数据类型"
  - name: new_name
    description: "例程的新名称"
  - name: new_owner
    description: "例程的新所有者"
  - name: new_schema
    description: "例程的新模式"

related_commands:
  - ALTER AGGREGATE
  - ALTER FUNCTION
  - ALTER PROCEDURE
  - DROP ROUTINE

metadata:
  source_page: 1583
  doc_version: "PostgreSQL 16.4"
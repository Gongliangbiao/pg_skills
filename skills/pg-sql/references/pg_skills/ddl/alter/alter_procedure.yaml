skillid: pg_alter_procedure
name: ALTER PROCEDURE
category: DDL
subcategory: alter

description:
  brief: "修改存储过程的定义，包括名称、所有者、模式、安全属性和配置参数"

syntax:
  primary: "ALTER PROCEDURE name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ]\n    action [ ... ] [ RESTRICT ]\nALTER PROCEDURE name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ]\n    RENAME TO new_name\nALTER PROCEDURE name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ]\n    OWNER TO { new_owner | CURRENT_ROLE | CURRENT_USER | SESSION_USER }\nALTER PROCEDURE name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ]\n    SET SCHEMA new_schema\nALTER PROCEDURE name [ ( [ [ argmode ] [ argname ] argtype [, ...] ] ) ]\n    [ NO ] DEPENDS ON EXTENSION extension_name\n\nwhere action is one of:\n    [ EXTERNAL ] SECURITY INVOKER | [ EXTERNAL ] SECURITY DEFINER\n    SET configuration_parameter { TO | = } { value | DEFAULT }\n    SET configuration_parameter FROM CURRENT\n    RESET configuration_parameter\n    RESET ALL"

key_parameters:
  - name: name
    description: "现有存储过程的名称（可选模式限定）"
  - name: argmode
    description: "参数模式：IN, OUT, INOUT或VARIADIC，默认IN"
  - name: argtype
    description: "参数的数据类型"
  - name: new_name
    description: "存储过程的新名称"
  - name: new_owner
    description: "存储过程的新所有者"
  - name: new_schema
    description: "存储过程的新模式"

related_commands:
  - CREATE PROCEDURE
  - DROP PROCEDURE
  - ALTER FUNCTION
  - ALTER ROUTINE

metadata:
  source_page: 1573
  doc_version: "PostgreSQL 16.4"
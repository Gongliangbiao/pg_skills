skillid: pg_alter_schema
name: ALTER SCHEMA
category: DDL
subcategory: alter

description:
  brief: "修改模式定义，包括名称和所有者"

syntax:
  primary: "ALTER SCHEMA name RENAME TO new_name\nALTER SCHEMA name OWNER TO { new_owner | CURRENT_ROLE | CURRENT_USER | SESSION_USER }"

key_parameters:
  - name: name
    description: "现有模式的名称"
  - name: new_name
    description: "模式的新名称，不能以pg_开头"
  - name: new_owner
    description: "模式的新所有者"

related_commands:
  - CREATE SCHEMA
  - DROP SCHEMA

metadata:
  source_page: 1586
  doc_version: "PostgreSQL 16.4"
skillid: pg_alter_user
name: ALTER USER
category: DDL
subcategory: alter

description:
  brief: "修改数据库角色定义，ALTER USER现在是ALTER ROLE的别名"

syntax:
  primary: "ALTER USER role_specification [ WITH ] option [ ... ]\n\nwhere option can be:\n    SUPERUSER | NOSUPERUSER\n    | CREATEDB | NOCREATEDB\n    | CREATEROLE | NOCREATEROLE\n    | INHERIT | NOINHERIT\n    | LOGIN | NOLOGIN\n    | REPLICATION | NOREPLICATION\n    | BYPASSRLS | NOBYPASSRLS\n    | CONNECTION LIMIT connlimit\n    | [ ENCRYPTED ] PASSWORD 'password' | PASSWORD NULL\n    | VALID UNTIL 'timestamp'\n\nALTER USER name RENAME TO new_name\nALTER USER { role_specification | ALL } [ IN DATABASE database_name ] SET configuration_parameter { TO | = } { value | DEFAULT }\nALTER USER { role_specification | ALL } [ IN DATABASE database_name ] RESET configuration_parameter\nALTER USER { role_specification | ALL } [ IN DATABASE database_name ] RESET ALL\n\nwhere role_specification can be:\n    role_name | CURRENT_ROLE | CURRENT_USER | SESSION_USER"

key_parameters:
  - name: role_specification
    description: "角色名称或当前角色标识"
  - name: option
    description: "角色属性选项"
  - name: new_name
    description: "角色的新名称"
  - name: configuration_parameter
    description: "配置参数名称"

related_commands:
  - ALTER ROLE
  - CREATE ROLE
  - DROP ROLE

metadata:
  source_page: 1631
  doc_version: "PostgreSQL 16.4"
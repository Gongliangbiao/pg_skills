skillid: pg_alter_operator
name: ALTER OPERATOR
category: DDL
subcategory: alter

description:
  brief: "Change the definition of an operator"
  detailed: |
    ALTER OPERATOR changes the definition of an operator.
    You must own the operator to use ALTER OPERATOR.
    To alter the owner, you must be able to SET ROLE to the new owning role,
    and that role must have CREATE privilege on the operator's schema.

syntax:
  primary: |
    ALTER OPERATOR name ( { left_type | NONE } , right_type )
        OWNER TO { new_owner | CURRENT_ROLE | CURRENT_USER | SESSION_USER }
    ALTER OPERATOR name ( { left_type | NONE } , right_type )
        SET SCHEMA new_schema
    ALTER OPERATOR name ( { left_type | NONE } , right_type )
        SET ( { RESTRICT = { res_proc | NONE }
               | JOIN = { join_proc | NONE }
             } [, ... ] )

key_parameters:
  - name: "name"
    description: "The name (optionally schema-qualified) of an existing operator"
    pg_specific: true
  - name: "left_type"
    description: "The data type of the operator's left operand; write NONE if no left operand"
    pg_specific: true
  - name: "right_type"
    description: "The data type of the operator's right operand"
    pg_specific: true
  - name: "new_owner"
    description: "The new owner of the operator"
    pg_specific: false
  - name: "new_schema"
    description: "The new schema for the operator"
    pg_specific: false
  - name: "res_proc"
    description: "The restriction selectivity estimator function; NONE to remove existing"
    pg_specific: true
  - name: "join_proc"
    description: "The join selectivity estimator function; NONE to remove existing"
    pg_specific: true

related_commands:
  - skillid: pg_create_operator
  - skillid: pg_drop_operator


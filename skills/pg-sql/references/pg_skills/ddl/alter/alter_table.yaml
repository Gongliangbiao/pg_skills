skillid: pg_alter_table
name: ALTER TABLE
category: DDL
subcategory: alter

description:
  brief: "Change the definition of a table"
  detailed: |
    ALTER TABLE changes the definition of an existing table.
    There are several subforms:
    - ADD COLUMN: Add a new column
    - DROP COLUMN: Remove a column
    - ALTER COLUMN: Change column type, default, etc.
    - ADD CONSTRAINT: Add table constraint
    - DROP CONSTRAINT: Remove constraint
    - SET/DROP DEFAULT: Change column default
    - OWNER TO: Change table owner
    - SET SCHEMA: Move table to different schema
    - ATTACH/DETACH PARTITION: Partition management

syntax:
  primary: |
    ALTER TABLE [ IF EXISTS ] name [ * ]
    action [, ... ]

  variants:
    - name: "Add column"
      syntax: "ALTER TABLE name ADD COLUMN column_name data_type [constraint];"
    - name: "Drop column"
      syntax: "ALTER TABLE name DROP COLUMN [ IF EXISTS ] column_name [ CASCADE | RESTRICT ];"
    - name: "Change column type"
      syntax: "ALTER TABLE name ALTER COLUMN column_name TYPE new_type [ USING expression ];"
    - name: "Add constraint"
      syntax: "ALTER TABLE name ADD CONSTRAINT constraint_name constraint_definition;"
    - name: "Set default"
      syntax: "ALTER TABLE name ALTER COLUMN column_name SET DEFAULT expression;"
    - name: "Attach partition"
      syntax: "ALTER TABLE name ATTACH PARTITION partition_name FOR VALUES ...;"

key_parameters:
  - name: "IF EXISTS"
    type: "keyword"
    required: false
    pg_specific: true
    description: "Do not throw error if table doesn't exist"
  - name: "name"
    type: "identifier"
    required: true
    description: "Table name (optionally schema-qualified)"
  - name: "action"
    type: "compound"
    required: true
    description: "Specific alteration action (ADD, DROP, ALTER, etc.)"

actions:
  - name: "ADD COLUMN"
    effect: "Add new column to table"
  - name: "DROP COLUMN"
    effect: "Remove column from table"
  - name: "ALTER COLUMN SET/DROP NOT NULL"
    effect: "Modify nullability"
  - name: "ALTER COLUMN SET DEFAULT"
    effect: "Set column default value"
  - name: "ALTER COLUMN DROP DEFAULT"
    effect: "Remove column default"
  - name: "ALTER COLUMN TYPE"
    effect: "Change column data type"
  - name: "ADD CONSTRAINT"
    effect: "Add table constraint"
  - name: "DROP CONSTRAINT"
    effect: "Remove constraint"
  - name: "VALIDATE CONSTRAINT"
    effect: "Validate existing constraint"
  - name: "OWNER TO"
    effect: "Change table owner"
  - name: "SET SCHEMA"
    effect: "Move to different schema"
  - name: "ATTACH PARTITION"
    effect: "Attach partition to partitioned table"
    pg_specific: true
  - name: "DETACH PARTITION"
    effect: "Detach partition from partitioned table"
    pg_specific: true

notes:
  prerequisites:
    - "Must own the table or have appropriate privileges"
  restrictions:
    - "Changing column type may require USING expression"
    - "Cannot drop column with dependent objects without CASCADE"
  best_practices:
    - "Use NOT VALID for constraints on large tables, then VALIDATE later"
    - "Use CONCURRENTLY for indexes where possible"
  warnings:
    - "ALTER TABLE may lock the table, affecting concurrent access"

examples:
  basic:
    - title: "Add column"
      code: |
        ALTER TABLE users ADD COLUMN phone TEXT;
      explanation: "Add new phone column"
    - title: "Change column type"
      code: |
        ALTER TABLE products ALTER COLUMN price TYPE NUMERIC(10,2);
      explanation: "Modify price column precision"
  advanced:
    - title: "Add constraint without validation"
      code: |
        ALTER TABLE orders ADD CONSTRAINT fk_customer
        FOREIGN KEY (customer_id) REFERENCES customers(id)
        NOT VALID;

        ALTER TABLE orders VALIDATE CONSTRAINT fk_customer;
      explanation: "Add constraint in two steps to avoid table lock"
    - title: "Detach partition"
      code: |
        ALTER TABLE sales DETACH PARTITION sales_2023;
      explanation: "Separate partition for independent management"

related_commands:
  - skillid: pg_create_table
    relationship: "Create new table"
  - skillid: pg_drop_table
    relationship: "Remove table"
  - skillid: pg_alter_index
    relationship: "Modify index"

compatibility:
  sql_standard: true
  notes: |
    SQL standard supports ALTER TABLE.
    PostgreSQL extensions: IF EXISTS, VALIDATE CONSTRAINT,
    ATTACH/DETACH PARTITION, many additional actions.

metadata:
  source_page: 1598
  doc_version: "PostgreSQL 16.4"
  priority: high
  frequency: frequent
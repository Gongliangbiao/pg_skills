skillid: pg_alter_foreign_table
name: ALTER FOREIGN TABLE
category: DDL
subcategory: alter

description:
  brief: "Change the definition of a foreign table"
  detailed: |
    ALTER FOREIGN TABLE changes the definition of an existing foreign table. There are several subforms:
    - ADD COLUMN: Add a new column to the foreign table
    - DROP COLUMN: Drop a column from a foreign table
    - SET DATA TYPE: Change the type of a column
    - SET/DROP DEFAULT: Set or remove default value for a column
    - SET/DROP NOT NULL: Mark column as allowing or not allowing null values
    - ADD/DROP CONSTRAINT: Add or remove constraint on foreign table
    - OWNER TO: Change the owner of the foreign table
    - OPTIONS: Change options for the foreign table
    - RENAME: Change the name of a foreign table or column
    - SET SCHEMA: Move the foreign table into another schema

syntax:
  primary: |
    ALTER FOREIGN TABLE [ IF EXISTS ] [ ONLY ] name [ * ]
        action [, ... ]
    ALTER FOREIGN TABLE [ IF EXISTS ] [ ONLY ] name [ * ]
        RENAME [ COLUMN ] column_name TO new_column_name
    ALTER FOREIGN TABLE [ IF EXISTS ] name
        RENAME TO new_name
    ALTER FOREIGN TABLE [ IF EXISTS ] name
        SET SCHEMA new_schema

key_parameters:
  - name: "name"
    description: "The name (possibly schema-qualified) of an existing foreign table to alter"
    pg_specific: true
  - name: "IF EXISTS"
    description: "Do not throw error if foreign table does not exist"
    pg_specific: true
  - name: "ONLY"
    description: "Alter only the named table, not its descendants"
    pg_specific: true
  - name: "column_name"
    description: "Name of a new or existing column"
    pg_specific: false
  - name: "data_type"
    description: "Data type of the new column, or new data type for an existing column"
    pg_specific: false
  - name: "new_owner"
    description: "The user name of the new owner of the table"
    pg_specific: false
  - name: "new_schema"
    description: "The name of the schema to which the table will be moved"
    pg_specific: false
  - name: "OPTIONS"
    description: "Change options for the foreign table (ADD, SET, DROP)"
    pg_specific: true

notes:
  - "Consistency with the foreign server is not checked when columns are added or removed"
  - "User must ensure the table definition matches the remote side"

related_commands:
  - skillid: pg_create_foreign_table
  - skillid: pg_drop_foreign_table


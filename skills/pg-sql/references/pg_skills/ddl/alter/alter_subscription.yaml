skillid: pg_alter_subscription
name: ALTER SUBSCRIPTION
category: DDL
subcategory: alter

description:
  brief: "修改订阅定义，包括连接信息、发布、启用/禁用、参数设置等"

syntax:
  primary: "ALTER SUBSCRIPTION name CONNECTION 'conninfo'\nALTER SUBSCRIPTION name SET PUBLICATION publication_name [, ...] [ WITH ( publication_option [= value] [, ... ] ) ]\nALTER SUBSCRIPTION name ADD PUBLICATION publication_name [, ...] [ WITH ( publication_option [= value] [, ... ] ) ]\nALTER SUBSCRIPTION name DROP PUBLICATION publication_name [, ...] [ WITH ( publication_option [= value] [, ... ] ) ]\nALTER SUBSCRIPTION name REFRESH PUBLICATION [ WITH ( refresh_option [= value] [, ... ] ) ]\nALTER SUBSCRIPTION name ENABLE\nALTER SUBSCRIPTION name DISABLE\nALTER SUBSCRIPTION name SET ( subscription_parameter [= value] [, ... ] )\nALTER SUBSCRIPTION name SKIP ( skip_option = value )\nALTER SUBSCRIPTION name OWNER TO { new_owner | CURRENT_ROLE | CURRENT_USER | SESSION_USER }\nALTER SUBSCRIPTION name RENAME TO new_name"

key_parameters:
  - name: name
    description: "要修改的订阅名称"
  - name: CONNECTION
    description: "连接信息字符串"
  - name: PUBLICATION
    description: "发布名称，SET替换、ADD添加、DROP删除"
  - name: REFRESH PUBLICATION
    description: "刷新发布信息"
  - name: ENABLE/DISABLE
    description: "启用或禁用订阅"
  - name: subscription_parameter
    description: "订阅参数"

related_commands:
  - CREATE SUBSCRIPTION
  - DROP SUBSCRIPTION
  - CREATE PUBLICATION
  - ALTER PUBLICATION

metadata:
  source_page: 1593
  doc_version: "PostgreSQL 16.4"
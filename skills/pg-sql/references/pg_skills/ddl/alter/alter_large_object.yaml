skillid: pg_alter_large_object
name: ALTER LARGE OBJECT
category: DDL
subcategory: alter

description:
  brief: "Change the definition of a large object"
  detailed: |
    ALTER LARGE OBJECT changes the definition of a large object.
    You must own the large object to use ALTER LARGE OBJECT.
    To alter the owner, you must also be able to SET ROLE to the new owning role.
    Currently, the only functionality is to assign a new owner.

syntax:
  primary: |
    ALTER LARGE OBJECT large_object_oid OWNER TO { new_owner | CURRENT_ROLE | CURRENT_USER | SESSION_USER }

key_parameters:
  - name: "large_object_oid"
    description: "OID of the large object to be altered"
    pg_specific: true
  - name: "new_owner"
    description: "The new owner of the large object"
    pg_specific: false

notes:
  - "Currently only supports changing the owner"
  - "Superuser can alter any large object"

related_commands:
  - skillid: pg_create_large_object
  - skillid: pg_drop_large_object

metadata:
  source_page: 1561
  doc_version: "PostgreSQL 16.4"
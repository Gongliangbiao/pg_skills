skillid: pg_create_procedure
name: CREATE PROCEDURE
category: DDL
subcategory: create

description:
  brief: "Define a new procedure"

syntax:
  primary: "CREATE [ OR REPLACE ] PROCEDURE name ( [ [ argmode ] [ argname ] argtype [ { DEFAULT | = } default_expr ] [, ...] ] ) { LANGUAGE lang_name | TRANSFORM { FOR TYPE type_name } [, ...] | [ EXTERNAL ] SECURITY INVOKER | [ EXTERNAL ] SECURITY DEFINER | SET configuration_parameter { TO value | = value | FROM CURRENT } | AS 'definition' | AS 'obj_file', 'link_symbol' | sql_body } ..."

key_parameters:
  - name: name
    description: "The name (optionally schema-qualified) of the procedure to create"
  - name: argmode
    description: "The mode of an argument: IN, OUT, INOUT, or VARIADIC. Default is IN"
  - name: argname
    description: "The name of an argument"
  - name: argtype
    description: "The data type(s) of the procedure's arguments"
  - name: lang_name
    description: "The name of the language that the procedure is implemented in"
  - name: SECURITY INVOKER | SECURITY DEFINER
    description: "Specifies whether the procedure executes with privileges of the caller or the owner"
  - name: definition
    description: "A string constant defining the procedure"

related_commands:
  - ALTER PROCEDURE
  - DROP PROCEDURE
  - CALL
  - CREATE FUNCTION

metadata:
  source_page: 1739
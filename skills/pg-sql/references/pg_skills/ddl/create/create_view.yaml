skillid: pg_create_view
name: CREATE VIEW
category: DDL
subcategory: create

description:
  brief: "Define a new view"
  detailed: "CREATE VIEW defines a view of a query. The view is not physically materialized; the query is run on each reference."

syntax:
  primary: |
    CREATE [ OR REPLACE ] [ TEMP | TEMPORARY ] [ RECURSIVE ] VIEW name
    [ ( column_name [, ...] ) ]
    [ WITH ( view_option_name [= view_option_value] [, ... ] ) ]
    AS query
    [ WITH [ CASCADED | LOCAL ] CHECK OPTION ]

key_parameters:
  - name: "OR REPLACE"
    pg_specific: true
    description: "Replace existing view"
  - name: "TEMP/TEMPORARY"
    description: "Create temporary view"
  - name: "RECURSIVE"
    pg_specific: true
    description: "Create recursive view"
  - name: "CHECK OPTION"
    description: "Validate inserted/updated rows against view query"

related_commands:
  - skillid: pg_alter_view
  - skillid: pg_drop_view
  - skillid: pg_create_materialized_view

metadata:
  source_page: 1828
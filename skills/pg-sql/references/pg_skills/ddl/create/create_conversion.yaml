skillid: pg_create_conversion
name: CREATE CONVERSION
category: DDL
subcategory: create

description:
  brief: "定义新的字符编码转换，用于在两种字符编码之间进行转换"

syntax:
  primary: "CREATE [ DEFAULT ] CONVERSION name FOR source_encoding TO dest_encoding FROM function_name"

key_parameters:
  - name: DEFAULT
    desc: "标记此转换为该编码对的默认转换，用于客户端和服务器间的自动编码转换"
  - name: name
    desc: "转换名称，可带模式限定"
  - name: source_encoding
    desc: "源编码名称"
  - name: dest_encoding
    desc: "目标编码名称"
  - name: function_name
    desc: "执行转换的函数名称，需符合conv_proc签名"

related_commands:
  - skillid: pg_alter_conversion
  - skillid: pg_drop_conversion
  - skillid: pg_create_function

metadata:
  source_page: 1680
skillid: pg_create_function
name: CREATE FUNCTION
category: DDL
subcategory: create

description:
  brief: "Define a new function"
  detailed: "CREATE FUNCTION defines a new function. PostgreSQL supports multiple languages: SQL, PL/pgSQL, C, etc."

syntax:
  primary: |
    CREATE [ OR REPLACE ] FUNCTION
    name ( [ [ argmode ] [ argname ] argtype [ { DEFAULT | = } default_expr ] [, ...] ] )
    [ RETURNS rettype | RETURNS TABLE ( column_name column_type [, ...] ) ]
    { LANGUAGE lang_name
      | TRANSFORM { FOR TYPE type_name } [, ... ]
      | WINDOW
      | { IMMUTABLE | STABLE | VOLATILE }
      | [ NOT ] LEAKPROOF
      | { CALLED ON NULL INPUT | RETURNS NULL ON NULL INPUT | STRICT }
      | { [ EXTERNAL ] SECURITY INVOKER | [ EXTERNAL ] SECURITY DEFINER }
      | PARALLEL { UNSAFE | RESTRICTED | SAFE }
      | COST execution_cost
      | ROWS result_rows
      | SUPPORT support_function
      | SET configuration_parameter { TO value | = value | FROM CURRENT }
      | AS 'definition'
      | AS 'obj_file', 'link_symbol'
    } ...

key_parameters:
  - name: "LANGUAGE"
    description: "Implementation language (plpgsql, sql, c)"
  - name: "RETURNS"
    description: "Return type or TABLE definition"
  - name: "IMMUTABLE/STABLE/VOLATILE"
    pg_specific: true
    description: "Function volatility category"
  - name: "SECURITY DEFINER/INVOKER"
    description: "Execution security context"

related_commands:
  - skillid: pg_alter_function
  - skillid: pg_drop_function
  - skillid: pg_create_procedure

metadata:
  source_page: 1702
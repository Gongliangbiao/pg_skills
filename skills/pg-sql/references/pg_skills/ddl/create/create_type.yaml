skillid: pg_create_type
name: CREATE TYPE
category: DDL
subcategory: create

description:
  brief: "Define a new data type"

syntax:
  primary: "CREATE TYPE name AS ( [ attribute_name data_type [ COLLATE collation ] [, ...] ] ) | CREATE TYPE name AS ENUM ( [ 'label' [, ...] ] ) | CREATE TYPE name AS RANGE ( SUBTYPE = subtype [, SUBTYPE_OPCLASS = subtype_operator_class ] [, COLLATION = collation ] [, CANONICAL = canonical_function ] [, SUBTYPE_DIFF = subtype_diff_function ] [, MULTIRANGE_TYPE_NAME = multirange_type_name ] ) | CREATE TYPE name ( INPUT = input_function, OUTPUT = output_function [, RECEIVE = receive_function ] [, SEND = send_function ] [, ...] ) | CREATE TYPE name"

key_parameters:
  - name: name
    description: "The name (optionally schema-qualified) of a type to be created"
  - name: attribute_name
    description: "The name of an attribute (column) for the composite type"
  - name: data_type
    description: "The name of an existing data type to become a column of the composite type"
  - name: label
    description: "A string literal representing the textual label for an enum type value"
  - name: SUBTYPE = subtype
    description: "The name of the element type that the range type will represent ranges of"
  - name: INPUT = input_function
    description: "The name of a function that converts data from external textual form to internal form"
  - name: OUTPUT = output_function
    description: "The name of a function that converts data from internal form to external textual form"

related_commands:
  - ALTER TYPE
  - DROP TYPE
  - CREATE FUNCTION

metadata:
  source_page: 1816
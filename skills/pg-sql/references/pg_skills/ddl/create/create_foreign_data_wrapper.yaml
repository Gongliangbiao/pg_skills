skillid: pg_create_foreign_data_wrapper
name: CREATE FOREIGN DATA WRAPPER
category: DDL
subcategory: create

description:
  brief: "定义新的外部数据包装器(FDW)，用于访问外部数据源"

syntax:
  primary: "CREATE FOREIGN DATA WRAPPER name [ HANDLER handler_function | NO HANDLER ] [ VALIDATOR validator_function | NO VALIDATOR ] [ OPTIONS ( option 'value' [, ... ] ) ]"

key_parameters:
  - name: name
    desc: "外部数据包装器名称，必须在数据库中唯一"
  - name: handler_function
    desc: "处理函数名称，用于检索外部表的执行函数，返回fdw_handler类型"
  - name: NO HANDLER
    desc: "无处理函数，外部表只能声明不能访问"
  - name: validator_function
    desc: "验证函数名称，检查FDW、外部服务器、用户映射和外部表的选项"
  - name: NO VALIDATOR
    desc: "不验证选项"
  - name: OPTIONS
    desc: "外部数据包装器的选项，名称和值由具体FDW决定"

related_commands:
  - skillid: pg_alter_foreign_data_wrapper
  - skillid: pg_drop_foreign_data_wrapper
  - skillid: pg_create_server
  - skillid: pg_create_foreign_table

metadata:
  source_page: 1695
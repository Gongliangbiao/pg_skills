skillid: pg_create_text_search_parser
name: CREATE TEXT SEARCH PARSER
category: DDL
subcategory: create

description:
  brief: "Define a new text search parser"

syntax:
  primary: "CREATE TEXT SEARCH PARSER name ( START = start_function, GETTOKEN = gettoken_function, END = end_function, LEXTYPES = lextypes_function [, HEADLINE = headline_function ] )"

key_parameters:
  - name: name
    description: "The name of the text search parser to be created. Can be schema-qualified"
  - name: START = start_function
    description: "The name of the start function for the parser"
  - name: GETTOKEN = gettoken_function
    description: "The name of the get-next-token function for the parser"
  - name: END = end_function
    description: "The name of the end function for the parser"
  - name: LEXTYPES = lextypes_function
    description: "The name of the lextypes function (returns information about token types)"
  - name: HEADLINE = headline_function
    description: "The name of the headline function (summarizes a set of tokens). Optional"

related_commands:
  - ALTER TEXT SEARCH PARSER
  - DROP TEXT SEARCH PARSER

metadata:
  source_page: 1804
skillid: pg_create_event_trigger
name: CREATE EVENT TRIGGER
category: DDL
subcategory: create

description:
  brief: "定义新的事件触发器，在特定DDL事件发生时执行指定函数"

syntax:
  primary: "CREATE EVENT TRIGGER name ON event [ WHEN filter_variable IN (filter_value [, ... ]) [ AND ... ] ] EXECUTE { FUNCTION | PROCEDURE } function_name()"

key_parameters:
  - name: name
    desc: "触发器名称，必须在数据库中唯一"
  - name: event
    desc: "触发事件的名称，如ddl_command_start、ddl_command_end、sql_drop、table_rewrite"
  - name: filter_variable
    desc: "用于过滤事件的变量名，目前仅支持TAG"
  - name: filter_value
    desc: "过滤变量值列表，如命令标签'DROP FUNCTION'"
  - name: function_name
    desc: "用户提供的函数，无参数，返回event_trigger类型"

related_commands:
  - skillid: pg_alter_event_trigger
  - skillid: pg_drop_event_trigger
  - skillid: pg_create_function

metadata:
  source_page: 1690
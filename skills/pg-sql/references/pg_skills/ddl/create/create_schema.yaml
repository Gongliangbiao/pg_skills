skillid: pg_create_schema
name: CREATE SCHEMA
category: DDL
subcategory: create

description:
  brief: "Define a new schema"
  detailed: "CREATE SCHEMA enters a new schema into the current database. The schema name must be distinct from existing schemas."

syntax:
  primary: |
    CREATE SCHEMA [ IF NOT EXISTS ] schema_name [ AUTHORIZATION role_name ]
    [ schema_element [ ... ] ]

key_parameters:
  - name: "IF NOT EXISTS"
    pg_specific: true
    description: "Do not error if schema exists"
  - name: "schema_name"
    description: "Schema name"
  - name: "AUTHORIZATION"
    description: "Schema owner"

examples:
  basic:
    - code: "CREATE SCHEMA app;"
    - code: "CREATE SCHEMA analytics AUTHORIZATION analyst;"

related_commands:
  - skillid: pg_alter_schema
  - skillid: pg_drop_schema

metadata:
  source_page: 1755
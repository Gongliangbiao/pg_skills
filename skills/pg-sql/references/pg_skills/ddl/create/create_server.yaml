skillid: pg_create_server
name: CREATE SERVER
category: DDL
subcategory: create

description:
  brief: "Define a new foreign server for foreign data access"

syntax:
  primary: "CREATE SERVER [ IF NOT EXISTS ] server_name [ TYPE 'server_type' ] [ VERSION 'server_version' ] FOREIGN DATA WRAPPER fdw_name [ OPTIONS ( option 'value' [, ...] ) ]"

key_parameters:
  - name: IF NOT EXISTS
    description: "Do not throw an error if a server with the same name already exists"
  - name: server_name
    description: "The name of the foreign server to be created"
  - name: server_type
    description: "Optional server type, potentially useful to foreign-data wrappers"
  - name: server_version
    description: "Optional server version, potentially useful to foreign-data wrappers"
  - name: fdw_name
    description: "The name of the foreign-data wrapper that manages the server"
  - name: OPTIONS
    description: "Specifies options for the server, typically connection details"

related_commands:
  - ALTER SERVER
  - DROP SERVER
  - CREATE FOREIGN DATA WRAPPER
  - CREATE FOREIGN TABLE
  - CREATE USER MAPPING

metadata:
  source_page: 1762
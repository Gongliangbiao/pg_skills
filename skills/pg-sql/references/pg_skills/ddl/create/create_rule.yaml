skillid: pg_create_rule
name: CREATE RULE
category: DDL
subcategory: create

description:
  brief: "Define a new rewrite rule for a table or view"

syntax:
  primary: "CREATE [ OR REPLACE ] RULE name AS ON event TO table_name [ WHERE condition ] DO [ ALSO | INSTEAD ] { NOTHING | command | ( command ; command ... ) }"

key_parameters:
  - name: name
    description: "The name of a rule to create"
  - name: event
    description: "The event is one of SELECT, INSERT, UPDATE, or DELETE"
  - name: table_name
    description: "The name (optionally schema-qualified) of the table or view the rule applies to"
  - name: condition
    description: "Any SQL conditional expression (returning boolean). Cannot refer to any tables except NEW and OLD"
  - name: INSTEAD
    description: "Indicates that the commands should be executed instead of the original command"
  - name: ALSO
    description: "Indicates that the commands should be executed in addition to the original command"
  - name: command
    description: "The command or commands that make up the rule action: SELECT, INSERT, UPDATE, DELETE, or NOTIFY"

related_commands:
  - ALTER RULE
  - DROP RULE

metadata:
  source_page: 1752
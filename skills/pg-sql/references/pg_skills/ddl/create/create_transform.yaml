skillid: pg_create_transform
name: CREATE TRANSFORM
category: DDL
subcategory: create

description:
  brief: "Define a new transform for adapting a data type to a procedural language"

syntax:
  primary: "CREATE [ OR REPLACE ] TRANSFORM FOR type_name LANGUAGE lang_name ( FROM SQL WITH FUNCTION from_sql_function_name [ (argument_type [, ...]) ], TO SQL WITH FUNCTION to_sql_function_name [ (argument_type [, ...]) ] )"

key_parameters:
  - name: type_name
    description: "The name of the data type of the transform"
  - name: lang_name
    description: "The name of the language of the transform"
  - name: from_sql_function_name
    description: "The name of the function for converting the type from SQL to the language"
  - name: to_sql_function_name
    description: "The name of the function for converting the type from the language to SQL"

related_commands:
  - CREATE FUNCTION
  - CREATE LANGUAGE
  - CREATE TYPE
  - DROP TRANSFORM

metadata:
  source_page: 1807
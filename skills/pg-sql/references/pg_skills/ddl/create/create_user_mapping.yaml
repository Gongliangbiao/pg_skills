skillid: pg_create_user_mapping
name: CREATE USER MAPPING
category: DDL
subcategory: create

description:
  brief: "Define a new mapping of a user to a foreign server"

syntax:
  primary: "CREATE USER MAPPING [ IF NOT EXISTS ] FOR { user_name | USER | CURRENT_ROLE | CURRENT_USER | PUBLIC } SERVER server_name [ OPTIONS ( option 'value' [, ...] ) ]"

key_parameters:
  - name: IF NOT EXISTS
    description: "Do not throw an error if a mapping of the given user to the given foreign server already exists"
  - name: user_name
    description: "The name of an existing user that is mapped to foreign server. CURRENT_USER, USER match current user. PUBLIC creates a public mapping"
  - name: server_name
    description: "The name of an existing server for which the user mapping is to be created"
  - name: OPTIONS ( option 'value' )
    description: "Specifies options of the user mapping, typically the actual user name and password"

related_commands:
  - ALTER USER MAPPING
  - DROP USER MAPPING
  - CREATE FOREIGN DATA WRAPPER
  - CREATE SERVER

metadata:
  source_page: 1826
skillid: pg_create_user
name: CREATE USER
category: DDL
subcategory: create

description:
  brief: "Define a new database role with LOGIN privilege (equivalent to CREATE ROLE with LOGIN)"

syntax:
  primary: "CREATE USER name [ [ WITH ] option [ ...] ] where option can be: SUPERUSER | NOSUPERUSER | CREATEDB | NOCREATEDB | CREATEROLE | NOCREATEROLE | INHERIT | NOINHERIT | LOGIN | NOLOGIN | REPLICATION | NOREPLICATION | BYPASSRLS | NOBYPASSRLS | CONNECTION LIMIT connlimit | [ ENCRYPTED ] PASSWORD 'password' | PASSWORD NULL | VALID UNTIL 'timestamp' | IN ROLE role_name [, ...] | IN GROUP role_name [, ...] | ROLE role_name [, ...] | ADMIN role_name [, ...] | USER role_name [, ...] | SYSID uid"

key_parameters:
  - name: name
    description: "The name of the new user/role"
  - name: SUPERUSER | NOSUPERUSER
    description: "Determines whether the new role is a superuser. Default is NOSUPERUSER"
  - name: CREATEDB | NOCREATEDB
    description: "Defines the role's ability to create databases. Default is NOCREATEDB"
  - name: CREATEROLE | NOCREATEROLE
    description: "Determines whether a role can create, alter, drop other roles. Default is NOCREATEROLE"
  - name: LOGIN | NOLOGIN
    description: "Determines whether a role is allowed to log in. CREATE USER implies LOGIN by default"
  - name: PASSWORD 'password'
    description: "Sets the role's password"
  - name: VALID UNTIL 'timestamp'
    description: "Sets a date and time after which the role's password is no longer valid"

related_commands:
  - CREATE ROLE
  - ALTER ROLE
  - DROP ROLE


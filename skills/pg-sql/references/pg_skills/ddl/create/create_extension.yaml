skillid: pg_create_extension
name: CREATE EXTENSION
category: DDL
subcategory: create

description:
  brief: "将扩展载入当前数据库，扩展包含SQL对象如函数、数据类型、操作符等"

syntax:
  primary: "CREATE EXTENSION [ IF NOT EXISTS ] extension_name [ WITH ] [ SCHEMA schema_name ] [ VERSION version ] [ CASCADE ]"

key_parameters:
  - name: IF NOT EXISTS
    desc: "同名扩展已存在时不报错，发出通知"
  - name: extension_name
    desc: "要安装的扩展名称"
  - name: SCHEMA schema_name
    desc: "安装扩展对象的模式名称，需已存在"
  - name: VERSION version
    desc: "要安装的扩展版本，默认使用控制文件中指定的版本"
  - name: CASCADE
    desc: "自动安装此扩展依赖的任何尚未安装的扩展"

related_commands:
  - skillid: pg_alter_extension
  - skillid: pg_drop_extension

metadata:
  source_page: 1692
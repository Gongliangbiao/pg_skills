skillid: pg_create_materialized_view
name: CREATE MATERIALIZED VIEW
category: DDL
subcategory: create

description:
  brief: "定义新的物化视图，查询结果被物理存储并可定期刷新"

syntax:
  primary: "CREATE MATERIALIZED VIEW [ IF NOT EXISTS ] table_name [ (column_name [, ...] ) ] [ USING method ] [ WITH ( storage_parameter [= value] [, ... ] ) ] [ TABLESPACE tablespace_name ] AS query [ WITH [ NO ] DATA ]"

key_parameters:
  - name: IF NOT EXISTS
    desc: "同名关系已存在时不报错，发出通知"
  - name: table_name
    desc: "物化视图名称，可带模式限定"
  - name: column_name
    desc: "列名称列表"
  - name: USING method
    desc: "表访问方法名称"
  - name: WITH ( storage_parameter )
    desc: "存储参数设置"
  - name: TABLESPACE tablespace_name
    desc: "存储物化视图的表空间"
  - name: AS query
    desc: "SELECT、TABLE或VALUES命令"
  - name: WITH [ NO ] DATA
    desc: "是否在创建时填充数据，NO DATA则标记为不可扫描"

related_commands:
  - skillid: pg_alter_materialized_view
  - skillid: pg_drop_materialized_view
  - skillid: pg_refresh_materialized_view
  - skillid: pg_create_view

metadata:
  source_page: 1724
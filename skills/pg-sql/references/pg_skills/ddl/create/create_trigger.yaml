skillid: pg_create_trigger
name: CREATE TRIGGER
category: DDL
subcategory: create

description:
  brief: "Define a new trigger for a table, view, or foreign table"

syntax:
  primary: "CREATE [ OR REPLACE ] [ CONSTRAINT ] TRIGGER name { BEFORE | AFTER | INSTEAD OF } { event [ OR ...] } ON table_name [ FROM referenced_table_name ] [ NOT DEFERRABLE | [ DEFERRABLE ] [ INITIALLY IMMEDIATE | INITIALLY DEFERRED ] ] [ REFERENCING { { OLD | NEW } TABLE [ AS ] transition_relation_name } [ ...] ] [ FOR [ EACH ] { ROW | STATEMENT } ] [ WHEN ( condition ) ] EXECUTE { FUNCTION | PROCEDURE } function_name ( arguments )"

key_parameters:
  - name: name
    description: "The name to give the new trigger. Must be distinct for the same table"
  - name: BEFORE | AFTER | INSTEAD OF
    description: "Determines whether the function is called before, after, or instead of the event"
  - name: event
    description: "INSERT, UPDATE [ OF column_name [, ...] ], DELETE, or TRUNCATE"
  - name: table_name
    description: "The name of the table, view, or foreign table the trigger is for"
  - name: CONSTRAINT
    description: "Creates a constraint trigger. Must be AFTER ROW on plain tables"
  - name: FOR EACH ROW | FOR EACH STATEMENT
    description: "Row-level triggers fire for each row; statement-level triggers fire once per operation"
  - name: WHEN ( condition )
    description: "Boolean condition to test whether the trigger should be fired"
  - name: function_name
    description: "The function to execute when the trigger fires"

related_commands:
  - ALTER TRIGGER
  - DROP TRIGGER
  - CREATE FUNCTION


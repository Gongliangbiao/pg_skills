skillid: pg_create_statistics
name: CREATE STATISTICS
category: DDL
subcategory: create

description:
  brief: "Define extended statistics for a table"

syntax:
  primary: "CREATE STATISTICS [ [ IF NOT EXISTS ] statistics_name ] ON ( expression ) FROM table_name | CREATE STATISTICS [ [ IF NOT EXISTS ] statistics_name ] [ ( statistics_kind [, ...] ) ] ON { column_name | ( expression ) }, { column_name | ( expression ) } [, ...] FROM table_name"

key_parameters:
  - name: IF NOT EXISTS
    description: "Do not throw an error if a statistics object with the same name already exists"
  - name: statistics_name
    description: "The name (optionally schema-qualified) of the statistics object to be created"
  - name: statistics_kind
    description: "A multivariate statistics kind: ndistinct, dependencies, or mcv"
  - name: column_name
    description: "The name of a table column to be covered by the computed statistics"
  - name: expression
    description: "An expression to be covered by the computed statistics"
  - name: table_name
    description: "The name (optionally schema-qualified) of the table containing the columns"

related_commands:
  - ALTER STATISTICS
  - DROP STATISTICS
  - ANALYZE

metadata:
  source_page: 1764
skillid: pg_create_cast
name: CREATE CAST
category: DDL
subcategory: create

description:
  brief: "定义两个数据类型之间的转换(Cast)，指定如何执行类型转换"

syntax:
  primary: "CREATE CAST (source_type AS target_type) WITH FUNCTION function_name [ (argument_type [, ...]) ] [ AS ASSIGNMENT | AS IMPLICIT ]"

  alternative_1: "CREATE CAST (source_type AS target_type) WITHOUT FUNCTION [ AS ASSIGNMENT | AS IMPLICIT ]"

  alternative_2: "CREATE CAST (source_type AS target_type) WITH INOUT [ AS ASSIGNMENT | AS IMPLICIT ]"

key_parameters:
  - name: source_type
    desc: "源数据类型名称"
  - name: target_type
    desc: "目标数据类型名称"
  - name: function_name
    desc: "执行转换的函数名称"
  - name: WITHOUT FUNCTION
    desc: "表示源类型和目标类型二进制兼容，无需转换函数"
  - name: WITH INOUT
    desc: "I/O转换，通过源类型输出函数和目标类型输入函数完成转换"
  - name: AS ASSIGNMENT
    desc: "标记为赋值上下文可隐式调用"
  - name: AS IMPLICIT
    desc: "标记为任何上下文可隐式调用"

related_commands:
  - skillid: pg_create_function
  - skillid: pg_create_type
  - skillid: pg_drop_cast

metadata:
  source_page: 1673
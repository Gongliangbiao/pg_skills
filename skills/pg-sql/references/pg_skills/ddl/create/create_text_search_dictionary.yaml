skillid: pg_create_text_search_dictionary
name: CREATE TEXT SEARCH DICTIONARY
category: DDL
subcategory: create

description:
  brief: "Define a new text search dictionary"

syntax:
  primary: "CREATE TEXT SEARCH DICTIONARY name ( TEMPLATE = template [, option = value [, ...]] )"

key_parameters:
  - name: name
    description: "The name of the text search dictionary to be created. Can be schema-qualified"
  - name: TEMPLATE = template
    description: "The name of the text search template that will define the basic behavior of this dictionary"
  - name: option
    description: "The name of a template-specific option to be set for this dictionary"
  - name: value
    description: "The value to use for a template-specific option"

related_commands:
  - ALTER TEXT SEARCH DICTIONARY
  - DROP TEXT SEARCH DICTIONARY

metadata:
  source_page: 1802
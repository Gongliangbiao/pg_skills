skillid: pg_create_database
name: CREATE DATABASE
category: DDL
subcategory: create

description:
  brief: "Create a new database"
  detailed: "CREATE DATABASE creates a new PostgreSQL database. The creator becomes the owner."

syntax:
  primary: |
    CREATE DATABASE name
    [ [ WITH ] [ OWNER [=] user_name ]
           [ TEMPLATE [=] template ]
           [ ENCODING [=] encoding ]
           [ LC_COLLATE [=] lc_collate ]
           [ LC_CTYPE [=] lc_ctype ]
           [ TABLESPACE [=] tablespace_name ]
           [ ALLOW_CONNECTIONS [=] allowconn ]
           [ CONNECTION LIMIT [=] connlimit ]
           [ IS_TEMPLATE [=] istemplate ] ]

key_parameters:
  - name: "name"
    description: "Database name"
  - name: "OWNER"
    description: "Role owning the database"
  - name: "TEMPLATE"
    description: "Template database (default: template1)"
  - name: "ENCODING"
    description: "Character set encoding"

examples:
  basic:
    - code: "CREATE DATABASE mydb;"
    - code: "CREATE DATABASE mydb WITH OWNER alice ENCODING 'UTF8';"

related_commands:
  - skillid: pg_alter_database
  - skillid: pg_drop_database

metadata:
  source_page: 1682
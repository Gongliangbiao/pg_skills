skillid: pg_create_group
name: CREATE GROUP
category: DDL
subcategory: create

description:
  brief: "定义新的数据库角色，CREATE GROUP是CREATE ROLE的别名"

syntax:
  primary: "CREATE GROUP name [ [ WITH ] option [ ... ] ]"

  option_clause: "option: SUPERUSER | NOSUPERUSER | CREATEDB | NOCREATEDB | CREATEROLE | NOCREATEROLE | INHERIT | NOINHERIT | LOGIN | NOLOGIN | REPLICATION | NOREPLICATION | BYPASSRLS | NOBYPASSRLS | CONNECTION LIMIT connlimit | [ ENCRYPTED ] PASSWORD 'password' | PASSWORD NULL | VALID UNTIL 'timestamp' | IN ROLE role_name [, ...] | IN GROUP role_name [, ...] | ROLE role_name [, ...] | ADMIN role_name [, ...] | USER role_name [, ...] | SYSID uid"

key_parameters:
  - name: name
    desc: "角色名称"
  - name: SUPERUSER | NOSUPERUSER
    desc: "是否为超级用户，默认NOSUPERUSER"
  - name: CREATEDB | NOCREATEDB
    desc: "是否可创建数据库，默认NOCREATEDB"
  - name: CREATEROLE | NOCREATEROLE
    desc: "是否可创建角色，默认NOCREATEROLE"
  - name: LOGIN | NOLOGIN
    desc: "是否可登录，默认NOLOGIN"
  - name: PASSWORD
    desc: "密码设置"

related_commands:
  - skillid: pg_create_role
  - skillid: pg_alter_role
  - skillid: pg_drop_role

metadata:
  source_page: 1711
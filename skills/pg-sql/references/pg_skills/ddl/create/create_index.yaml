skillid: pg_create_index
name: CREATE INDEX
category: DDL
subcategory: create

description:
  brief: "Define a new index"
  detailed: |
    CREATE INDEX creates an index on the specified column(s) of the specified table.
    Indexes are primarily used to enhance database performance (though inappropriate
    use can result in slower performance).

    Indexes can be unique, meaning the indexed columns must have unique values.
    Partial indexes index only a subset of rows, defined by a WHERE clause.

syntax:
  primary: |
    CREATE [ UNIQUE ] INDEX [ CONCURRENTLY ] [ [ IF NOT EXISTS ] name ]
    ON [ ONLY ] table_name [ USING method ]
    ( { column_name | ( expression ) } [ COLLATE collation ]
      [ opclass [ ( opclass_parameter = value [, ... ] ) ] ]
      [ ASC | DESC ] [ NULLS { FIRST | LAST } ] [, ...] )
    [ INCLUDE ( column_name [, ...] ) ]
    [ NULLS [ NOT ] DISTINCT ]
    [ WITH ( storage_parameter [= value] [, ... ] ) ]
    [ TABLESPACE tablespace_name ]
    [ WHERE predicate ]

key_parameters:
  - name: "UNIQUE"
    type: "keyword"
    required: false
    description: "Creates a unique index that prevents duplicate values"
  - name: "CONCURRENTLY"
    type: "keyword"
    required: false
    pg_specific: true
    description: "Build index without locking table for writes"
  - name: "IF NOT EXISTS"
    type: "keyword"
    required: false
    pg_specific: true
    description: "Do not throw error if index already exists"
  - name: "name"
    type: "identifier"
    required: false
    description: "Name of the index. If omitted, auto-generated."
  - name: "table_name"
    type: "identifier"
    required: true
    description: "Table to index"
  - name: "USING method"
    type: "clause"
    required: false
    description: "Index access method: btree, hash, gist, spgist, gin, brin"
  - name: "column_name"
    type: "identifier"
    required: true
    description: "Column(s) to index"
  - name: "INCLUDE"
    type: "clause"
    required: false
    pg_specific: true
    description: "Include non-key columns in index for covering queries"
  - name: "WHERE predicate"
    type: "clause"
    required: false
    description: "Creates partial index on subset of rows"

notes:
  prerequisites:
    - "Must have CREATE privilege on table"
  best_practices:
    - "Use CONCURRENTLY for production indexes"
    - "Consider INCLUDE for covering indexes"
    - "Use partial indexes for targeted performance"
  warnings:
    - "CONCURRENTLY may take longer and require cleanup if aborted"

examples:
  basic:
    - title: "Simple index"
      code: |
        CREATE INDEX idx_users_email ON users(email);
      explanation: "Create index on email column"
    - title: "Unique index"
      code: |
        CREATE UNIQUE INDEX idx_users_username ON users(username);
      explanation: "Ensure usernames are unique"
  advanced:
    - title: "Concurrent index"
      code: |
        CREATE INDEX CONCURRENTLY idx_orders_date ON orders(order_date);
      explanation: "Create index without blocking writes"
    - title: "Partial index"
      code: |
        CREATE INDEX idx_active_users ON users(email)
        WHERE active = true;
      explanation: "Only index active users"
    - title: "Covering index"
      code: |
        CREATE INDEX idx_orders_covering ON orders(customer_id)
        INCLUDE (order_date, total_amount);
      explanation: "Include additional columns for query coverage"

related_commands:
  - skillid: pg_alter_index
    relationship: "Modify index"
  - skillid: pg_drop_index
    relationship: "Remove index"
  - skillid: pg_reindex
    relationship: "Rebuild index"

compatibility:
  sql_standard: true
  notes: |
    SQL standard supports basic CREATE INDEX.
    PostgreSQL extensions: CONCURRENTLY, IF NOT EXISTS,
    INCLUDE, USING various methods, partial indexes.

metadata:
  source_page: 1712
  doc_version: "PostgreSQL 16.4"
  priority: high
  frequency: frequent
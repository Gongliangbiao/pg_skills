# PostgreSQL Skill Schema - Standard Format
# Version: 1.0.0
# Reference: skillsmp.com specification

# ===== 必需字段 =====
name: string                          # 命令名称（大写）
description: string                   # 功能简述（一句话）

# ===== 可选但推荐字段 =====
version: string                       # 版本号（默认继承文档版本）
category: string                      # 分类：DDL/DML/DCL/TCL/Utility/Concurrency
subcategory: string                   # 子分类（DDL专用：alter/create/drop）
pg_specific: boolean                  # 是否为PostgreSQL特有命令

# ===== 语法定义 =====
syntax:
  primary: string                     # 主要语法格式
  variants:                           # 语法变体（可选）
    - name: string
      syntax: string
      description: string

# ===== 参数定义 =====
parameters:                           # 结构化参数列表
  - name: string                      # 参数名
    type: string                      # 类型：keyword/identifier/expression/clause
    required: boolean                 # 是否必需
    default: string                   # 默认值（可选）
    pg_specific: boolean              # PG特有标记
    description: string               # 说明

# ===== 选项定义 =====
options:                              # 可选项/修饰符
  - group: string                     # 选项组名
    items:
      - name: string
        effect: string

# ===== 示例定义 =====
examples:
  basic:                              # 基础示例
    - title: string                   # 示例标题
      code: string                    # SQL代码
      explanation: string             # 说明
  advanced:                           # 进阶示例（可选）

# ===== 注意事项 =====
notes:
  prerequisites: [string]             # 前置条件
  restrictions: [string]              # 限制条件
  best_practices: [string]            # 最佳实践
  warnings: [string]                  # 警告信息

# ===== 常见错误 =====
errors:                               # 常见错误及解决方案
  - code: string                      # 错误代码/消息
    cause: string                     # 原因
    solution: string                  # 解决方案

# ===== 相关命令 =====
related:
  - name: string                      # 相关命令名
    relationship: string              # 关系说明

# ===== 兼容性 =====
compatibility:
  sql_standard: boolean|string        # SQL标准兼容性
  notes: string                       # 差异说明

# ===== 元数据 =====
metadata:
  source_page: number                 # 原文档页码
  doc_version: string                 # 文档版本
  priority: string                    # 重要程度：high/medium/low
  frequency: string                   # 使用频率：frequent/common/rare
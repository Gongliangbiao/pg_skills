skillid: pg_mvcc
name: MVCC (Multiversion Concurrency Control)
category: Concurrency

description:
  brief: "PostgreSQL多版本并发控制机制"
  detailed: |
    PostgreSQL使用多版本并发控制(MVCC)来维护数据一致性。
    每个SQL语句看到的是数据在某个时间点的快照，而不是当前的实时状态。

    MVCC的主要优势：
    - 读操作不会阻塞写操作
    - 写操作不会阻塞读操作
    - 最小化锁争用，提高多用户环境下的性能

    PostgreSQL通过创新的Serializable Snapshot Isolation (SSI)级别
    提供最严格的事务隔离保证。

concepts:
  - name: "Snapshot（快照）"
    description: "每个SQL语句看到的数据版本，反映某个时间点的数据库状态"
  - name: "Version（版本）"
    description: "数据的多个历史版本，每个更新操作创建新版本"
  - name: "Visibility（可见性）"
    description: "确定哪些数据版本对当前事务可见的规则"

advantages:
  - "读取不阻塞写入，写入不阻塞读取"
  - "最小化锁争用"
  - "提供事务隔离保证"
  - "支持高并发多用户环境"

behavior:
  read_operations: "SELECT看到查询开始时已提交的数据快照"
  write_operations: "UPDATE/DELETE/INSERT创建数据新版本而非修改现有版本"
  cleanup: "VACUUM回收不再可见的旧数据版本"

notes:
  - "MVCC避免传统数据库的锁定方法"
  - "每个事务看到一致的数据视图"
  - "需要定期执行VACUUM清理旧版本"

related_topics:
  - skillid: pg_transaction_isolation
  - skillid: pg_vacuum


skillid: pg_locking_indexes
name: Locking and Indexes
category: Concurrency

description:
  brief: "不同索引类型的锁定行为"
  detailed: |
    PostgreSQL为表数据提供非阻塞读写访问，
    但不同索引访问方法的锁定行为不同。

index_types:
  btree_gist_spgist:
    lock_type: "短期share/exclusive页级锁"
    release: "每个索引行获取或插入后立即释放"
    deadlock: "不可能发生"
    concurrency: "最高并发性能"
    recommendation: "并发应用首选B-tree索引"

  hash:
    lock_type: "share/exclusive哈希桶级锁"
    release: "整个桶处理后释放"
    deadlock: "可能发生（锁持有时间较长）"
    concurrency: "比索引级锁好，但低于B-tree"

  gin:
    lock_type: "短期share/exclusive页级锁"
    release: "每个索引行获取或插入后立即释放"
    note: "单个值插入可能产生多个键插入"
    work_volume: "可能较大工作量"

recommendations:
  for_scalar_data: "B-tree索引最佳（性能好、功能多、并发高）"
  for_non_scalar_data: "GiST、SP-GiST或GIN索引"
  high_concurrency: "优先B-tree，避免Hash"

performance_comparison:
  btree: "最佳并发性能，无死锁风险"
  gist_spgist: "与B-tree类似的并发性能"
  hash: "中等并发，有死锁风险"
  gin: "页级锁快，但单次插入工作量可能大"

notes:
  - "索引锁行为影响并发性能"
  - "B-tree是目前并发应用的推荐选择"
  - "Hash索引功能较少，不如B-tree"

related_topics:
  - skillid: pg_create_index
  - skillid: pg_btree_index

metadata:
  source_page: 500-501
  doc_version: "PostgreSQL 16.4"
  chapter: "13.7 Locking and Indexes"
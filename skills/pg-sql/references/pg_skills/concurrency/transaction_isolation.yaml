name: Transaction Isolation Levels
description: PostgreSQL事务隔离级别详解，控制并发事务间的可见性
version: "16.4"
category: Concurrency
pg_specific: false

syntax:
  primary: |
    -- 设置事务隔离级别
    SET TRANSACTION ISOLATION LEVEL { READ COMMITTED | REPEATABLE READ | SERIALIZABLE };

    -- 在BEGIN时指定
    BEGIN ISOLATION LEVEL { READ COMMITTED | REPEATABLE READ | SERIALIZABLE };

    -- 设置默认级别
    SET default_transaction_isolation TO 'serializable';

parameters:
  - name: READ COMMITTED
    type: keyword
    required: false
    pg_specific: false
    default: true
    description: "默认级别，每个命令看到最新已提交数据"
  - name: REPEATABLE READ
    type: keyword
    required: false
    pg_specific: false
    description: "事务开始时的快照，整个事务期间不变"
  - name: SERIALIZABLE
    type: keyword
    required: false
    pg_specific: false
    description: "最严格级别，防止所有并发异常"

options:
  - group: "并发现象"
    items:
      - name: Dirty Read（脏读）
        effect: "读取未提交事务的数据"
        prevented_at: "所有级别"
      - name: Nonrepeatable Read（不可重复读）
        effect: "重读数据发现被修改"
        prevented_at: "Repeatable Read及以上"
      - name: Phantom Read（幻读）
        effect: "重执行查询结果集变化"
        prevented_at: "Serializable（PG的Repeatable Read也防止）"
      - name: Serialization Anomaly（序列化异常）
        effect: "并发结果与串行执行不一致"
        prevented_at: "仅Serializable"

examples:
  basic:
    - title: "设置隔离级别"
      code: |
        BEGIN ISOLATION LEVEL REPEATABLE READ;
        SELECT balance FROM accounts WHERE id = 1;
        -- 整个事务看到相同快照
        COMMIT;
      explanation: "使用Repeatable Read确保一致性视图"
    - title: "默认级别Read Committed"
      code: |
        BEGIN;
        -- 默认READ COMMITTED
        SELECT * FROM users;  -- 看到开始时已提交的数据
        -- 其他事务可能已提交新数据
        SELECT * FROM users;  -- 可能看到新数据
        COMMIT;
      explanation: "Read Committed每次查询都获取新快照"
  advanced:
    - title: "Serializable事务"
      code: |
        BEGIN ISOLATION LEVEL SERIALIZABLE;
        SELECT SUM(value) FROM mytab WHERE class = 1;
        INSERT INTO results VALUES (2, 30);
        COMMIT;
        -- 如果检测到读写依赖，可能抛出40001错误需要重试
      explanation: "Serializable级别防止所有并发异常"
    - title: "处理序列化失败"
      code: |
        -- 应用代码示例
        max_retries = 3
        for attempt in range(max_retries):
            BEGIN ISOLATION LEVEL SERIALIZABLE;
            try:
                -- 执行事务操作
                COMMIT;
                break;
            except SerializationError:
                ROLLBACK;
                if attempt == max_retries - 1:
                    raise;
      explanation: "Serializable事务需准备重试"

notes:
  prerequisites:
    - "无特殊前置条件"
  restrictions:
    - "已开始的事务不能更改隔离级别"
    - "PG的Read Uncommitted等同于Read Committed"
  best_practices:
    - "简单操作用Read Committed"
    - "一致性要求高用Repeatable Read或Serializable"
    - "Serializable事务声明READ ONLY减少开销"
  warnings:
    - "Repeatable Read和Serializable需准备重试（错误码40001）"
    - "长时间idle in transaction影响性能"

errors:
  - code: "40001 (serialization_failure)"
    cause: "检测到并发更新冲突"
    solution: "重试整个事务"
  - code: "could not serialize access due to concurrent update"
    cause: "Repeatable Read下尝试更新已被并发修改的行"
    solution: "回滚并重试事务"

related:
  - name: MVCC
    relationship: "多版本并发控制基础"
  - name: BEGIN
    relationship: "开始事务"
  - name: SET TRANSACTION
    relationship: "设置事务特性"
  - name: Deadlock
    relationship: "死锁处理（40P01）"

compatibility:
  sql_standard: true
  notes: "PG的Repeatable Read使用Snapshot Isolation技术，额外防止幻读"

metadata:
  source_page: 486-491
  doc_version: "PostgreSQL 16.4"
  priority: high
  frequency: frequent
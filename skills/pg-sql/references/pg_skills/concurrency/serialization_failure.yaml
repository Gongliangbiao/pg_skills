skillid: pg_serialization_failure
name: Serialization Failure Handling
category: Concurrency

description:
  brief: "处理序列化失败和重试策略"
  detailed: |
    Repeatable Read和Serializable隔离级别可能产生序列化失败错误。
    应用必须准备重试因序列化错误失败的事务。
    也建议重试死锁失败。

error_codes:
  serialization_failure:
    code: "40001"
    message: "could not serialize access due to concurrent update"
    trigger: "Repeatable Read检测到并发更新时"

  serialization_anomaly:
    code: "40001"
    message: "could not serialize access due to read/write dependencies among transactions"
    trigger: "Serializable检测到读写依赖时"

  deadlock_detected:
    code: "40P01"
    message: "deadlock detected"
    trigger: "检测到死锁时"

additional_retry_codes:
  unique_violation:
    code: "23505"
    context: "并发选择相同新键时"
    note: "实际上是序列化问题，但服务器不检测此关联"

  exclusion_violation:
    code: "23P01"
    context: "排除约束失败"
    note: "某些情况下可能是序列化问题的根源"

retry_strategy:
  requirements:
    - "重试整个事务，包括所有逻辑"
    - "重新决定执行哪些SQL和使用哪些值"
    - "PostgreSQL不提供自动重试"
  steps:
    - "1. 捕获错误（检查SQLSTATE）"
    - "2. 回滚当前事务"
    - "3. 等待短暂时间（可选）"
    - "4. 重新执行完整事务逻辑"
    - "5. 可能需要多次重试"

  example_code: |
    max_retries = 3
    for attempt in range(max_retries):
        try:
            conn.begin()
            # 执行事务逻辑
            conn.commit()
            break
        except SerializationError:
            conn.rollback()
            if attempt == max_retries - 1:
                raise

high_contention:
  issue: "高争用时可能需要多次尝试"
  prepared_transaction: "冲突的prepared事务可能阻塞直到其提交或回滚"

best_practices:
  - "无条件重试40001错误"
  - "谨慎重试23505和23P01（可能是持久错误）"
  - "设置合理的最大重试次数"
  - "在高争用场景考虑使用其他策略"

related_topics:
  - skillid: pg_transaction_isolation
  - skillid: pg_deadlock

metadata:
  source_page: 499-500
  doc_version: "PostgreSQL 16.4"
  chapter: "13.5 Serialization Failure Handling"
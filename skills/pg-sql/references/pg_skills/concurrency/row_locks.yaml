skillid: pg_row_locks
name: Row-Level Locks
category: Concurrency

description:
  brief: "PostgreSQL行级锁模式详解"
  detailed: |
    行级锁用于锁定特定行，防止其他事务修改或删除该行。
    行级锁不影响数据查询，只阻塞写入者和锁定者。
    行级锁在事务结束或savepoint回滚时释放。

lock_modes:
  - mode: "FOR UPDATE"
    description: "最严格行锁，防止其他事务锁定、修改或删除该行"
    blocks: ["UPDATE", "DELETE", "SELECT FOR UPDATE", "SELECT FOR NO KEY UPDATE", "SELECT FOR SHARE", "SELECT FOR KEY SHARE"]
    acquired_by: "SELECT FOR UPDATE, DELETE, UPDATE修改键列"

  - mode: "FOR NO KEY UPDATE"
    description: "稍弱于FOR UPDATE，不阻塞SELECT FOR KEY SHARE"
    blocks: ["UPDATE", "DELETE", "SELECT FOR UPDATE", "SELECT FOR NO KEY UPDATE", "SELECT FOR SHARE"]
    acquired_by: "UPDATE不修改键列时自动获取"

  - mode: "FOR SHARE"
    description: "共享锁，允许其他SELECT FOR SHARE/KEY SHARE"
    blocks: ["UPDATE", "DELETE", "SELECT FOR UPDATE", "SELECT FOR NO KEY UPDATE"]
    acquired_by: "SELECT FOR SHARE"

  - mode: "FOR KEY SHARE"
    description: "最弱行锁，只阻塞DELETE和键修改"
    blocks: ["DELETE", "UPDATE修改键", "SELECT FOR UPDATE"]
    acquired_by: "SELECT FOR KEY SHARE"

conflict_matrix:
  columns: ["FOR KEY SHARE", "FOR SHARE", "FOR NO KEY UPDATE", "FOR UPDATE"]
  conflicts:
    - requested: "FOR KEY SHARE"
      conflicts_with_for_update: true
    - requested: "FOR SHARE"
      conflicts_with_for_no_key_update: true
      conflicts_with_for_update: true
    - requested: "FOR NO KEY UPDATE"
      conflicts_with_for_share: true
      conflicts_with_for_no_key_update: true
      conflicts_with_for_update: true
    - requested: "FOR UPDATE"
      conflicts_with_for_key_share: true
      conflicts_with_for_share: true
      conflicts_with_for_no_key_update: true
      conflicts_with_for_update: true

syntax:
  primary: |
    SELECT ... FROM table_name WHERE condition
    [ FOR { UPDATE | NO KEY UPDATE | SHARE | KEY SHARE } [ OF table_name ] [ NOWAIT | SKIP LOCKED ] ]

  options:
    - name: "NOWAIT"
      effect: "无法立即获取锁时报错而非等待"
    - name: "SKIP LOCKED"
      effect: "跳过已被锁定的行，不等待"

behavior_in_isolation_levels:
  read_committed: "等待锁释放后锁定并返回更新后的行（或空）"
  repeatable_read_serializable: "如果行自事务开始后已改变，抛出错误"

key_columns:
  definition: "有唯一索引且可用于外键的列"
  note: "UPDATE修改这些列时获取FOR UPDATE锁"

performance:
  - "锁定行可能导致磁盘写入"
  - "无内存限制，可同时锁定任意数量行"
  - "SELECT FOR UPDATE会修改行标记锁定状态"

examples:
  basic:
    - code: |
        BEGIN;
        SELECT * FROM accounts WHERE id = 1 FOR UPDATE;
        -- 锁定该行，防止其他事务修改
        UPDATE accounts SET balance = balance - 100 WHERE id = 1;
        COMMIT;
    - code: |
        -- 使用NOWAIT立即失败
        SELECT * FROM accounts WHERE id = 1 FOR UPDATE NOWAIT;
    - code: |
        -- 使用SKIP LOCKED跳过已锁定行
        SELECT * FROM queue WHERE status = 'pending' FOR UPDATE SKIP LOCKED LIMIT 1;

related_topics:
  - skillid: pg_table_locks
  - skillid: pg_select
  - skillid: pg_deadlock

metadata:
  source_page: 495
  doc_version: "PostgreSQL 16.4"
  chapter: "13.3.2 Row-Level Locks"
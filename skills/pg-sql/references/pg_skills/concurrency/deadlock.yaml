skillid: pg_deadlock
name: Deadlock Detection and Handling
category: Concurrency

description:
  brief: "PostgreSQL死锁检测与处理机制"
  detailed: |
    死锁是两个或多个事务各自持有对方想要的锁的状态。
    PostgreSQL自动检测死锁并通过中止其中一个事务来解决。
    应用程序应准备处理死锁错误并重试事务。

deadlock_scenario:
  description: "两个事务互相等待对方持有的锁"
  example:
    - transaction_1: "锁定表A，然后尝试锁定表B"
    - transaction_2: "已锁定表B，现在尝试锁定表A"
    - result: "两个事务都无法继续"

row_level_deadlock:
  description: "行级锁也可能导致死锁"
  example:
    - step1: "事务1: UPDATE accounts WHERE id = 11111"
    - step2: "事务2: UPDATE accounts WHERE id = 22222"
    - step3: "事务2: UPDATE accounts WHERE id = 11111（等待事务1）"
    - step4: "事务1: UPDATE accounts WHERE id = 22222（等待事务2）"
    - result: "死锁，PostgreSQL中止一个事务"

error_codes:
  deadlock: "40P01 (deadlock_detected)"
  serialization_failure: "40001 (serialization_failure)"

handling:
  automatic: "PostgreSQL自动检测并中止一个事务"
  unpredictable: "哪个事务被中止不可预测，不应依赖"
  action: "应用程序必须重试被中止的事务"

prevention:
  best_practice: "所有应用以一致顺序获取多个对象的锁"
  example: "更新行时始终按id升序顺序"
  recommendation: "首先获取最严格的锁模式"
  retry: "如果无法预防，则处理死锁错误并重试"

warning:
  message: "等待锁的事务会无限等待（直到死锁检测）"
  advice: "不要长时间保持事务开启（如等待用户输入）"
  timeout_option: "可使用lock_timeout设置等待上限"

monitoring:
  view: "pg_locks显示当前锁状态"
  detection_time: "死锁检测周期性运行（约1秒间隔）"

retry_strategy:
  steps:
    - "捕获死锁错误（SQLSTATE 40P01）"
    - "中止当前事务"
    - "重新开始完整事务"
    - "可能需要多次重试"
  example_code: |
    BEGIN;
    -- 第一次尝试可能因死锁失败
    -- 捕获错误后重试整个事务逻辑
    COMMIT;

related_topics:
  - skillid: pg_table_locks
  - skillid: pg_row_locks
  - skillid: pg_serialization_failure

metadata:
  source_page: 496-497
  doc_version: "PostgreSQL 16.4"
  chapter: "13.3.4 Deadlocks"
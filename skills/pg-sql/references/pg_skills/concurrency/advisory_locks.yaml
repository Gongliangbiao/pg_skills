skillid: pg_advisory_locks
name: Advisory Locks
category: Concurrency

description:
  brief: "应用定义的建议性锁"
  detailed: |
    Advisory Locks是应用自定义含义的锁，系统不强制使用。
    适用于MVCC模型不适合的锁定策略。
    比表中的标志更快，避免表膨胀，会话结束时自动清理。

lock_types:
  session_level:
    behavior: "获取后持有直到显式释放或会话结束"
    transaction_semantics: "不遵循事务语义，回滚后仍持有"
    multiple_acquire: "可以多次获取，每次需要对应释放"

  transaction_level:
    behavior: "事务结束时自动释放"
    unlock: "无需显式解锁操作"
    convenience: "短期使用更方便"

functions:
  acquire:
    - name: "pg_advisory_lock(key)"
      type: "session-level, 64-bit key"
    - name: "pg_advisory_lock(key1, key2)"
      type: "session-level, two 32-bit keys"
    - name: "pg_advisory_xact_lock(key)"
      type: "transaction-level"
    - name: "pg_try_advisory_lock(key)"
      type: "non-blocking, returns boolean"
    - name: "pg_try_advisory_xact_lock(key)"
      type: "transaction-level non-blocking"

  release:
    - name: "pg_advisory_unlock(key)"
      type: "release session-level lock"
    - name: "pg_advisory_unlock_all()"
      type: "release all session advisory locks"

  shared:
    - name: "pg_advisory_lock_shared(key)"
      type: "shared session-level lock"
    - name: "pg_advisory_xact_lock_shared(key)"
      type: "shared transaction-level lock"

monitoring:
  view: "pg_locks显示当前持有的advisory locks"
  lock_mode: "ExclusiveLock或ShareLock"

capacity:
  storage: "共享内存池，由max_locks_per_transaction和max_connections定义"
  limit: "通常数万到数十万个锁"
  warning: "耗尽内存后服务器无法授予任何锁"

usage_patterns:
  pessimistic_locking: "模拟'flat file'系统的悲观锁定策略"
  resource_coordination: "协调对外部资源的访问"
  application_level_mutex: "应用级互斥"

danger_patterns:
  problem: "LIMIT可能在锁定函数执行前不应用"
  dangerous_example: "SELECT pg_advisory_lock(id) FROM foo WHERE id > 12345 LIMIT 100;"
  safe_approach: |
    SELECT pg_advisory_lock(q.id) FROM
    (SELECT id FROM foo WHERE id > 12345 LIMIT 100) q;

examples:
  session_level:
    - code: |
        SELECT pg_advisory_lock(12345);
        -- 执行需要独占访问的操作
        SELECT pg_advisory_unlock(12345);
  transaction_level:
    - code: |
        BEGIN;
        SELECT pg_advisory_xact_lock(12345);
        -- 事务结束自动释放
        COMMIT;
  non_blocking:
    - code: |
        SELECT pg_try_advisory_lock(12345);
        -- 返回true或false，不等待
  cleanup:
    - code: |
        SELECT pg_advisory_unlock_all(); -- 释放所有会话级advisory locks

related_topics:
  - skillid: pg_table_locks
  - skillid: pg_row_locks

metadata:
  source_page: 497-498
  doc_version: "PostgreSQL 16.4"
  chapter: "13.3.5 Advisory Locks"
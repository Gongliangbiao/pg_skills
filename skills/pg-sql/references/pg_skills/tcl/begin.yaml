skillid: pg_begin
name: BEGIN
category: TCL

description:
  brief: "Start a transaction block"
  detailed: |
    BEGIN initiates a transaction block, that is, all statements after a BEGIN
    command will be executed in a single transaction until an explicit COMMIT
    or ROLLBACK is given. By default (without BEGIN), PostgreSQL executes
    each statement in its own transaction.

syntax:
  primary: |
    BEGIN [ WORK | TRANSACTION ] [ transaction_mode [, ...] ]
  variants:
    - name: "Basic transaction"
      syntax: "BEGIN;"
    - name: "With isolation level"
      syntax: "BEGIN ISOLATION LEVEL READ COMMITTED;"

key_parameters:
  - name: "WORK/TRANSACTION"
    type: "keyword"
    required: false
    description: "Optional keywords with no effect"
  - name: "transaction_mode"
    type: "compound"
    required: false
    description: "Transaction characteristics"

transaction_modes:
  - name: "ISOLATION LEVEL READ COMMITTED"
    effect: "Default level, sees committed changes per statement"
  - name: "ISOLATION LEVEL REPEATABLE READ"
    effect: "Sees snapshot at transaction start"
  - name: "ISOLATION LEVEL SERIALIZABLE"
    effect: "Strictest isolation, detects serialization conflicts"
  - name: "READ WRITE"
    effect: "Allow reads and writes (default)"
  - name: "READ ONLY"
    effect: "Only allow reads"
  - name: "DEFERRABLE"
    effect: "Defer constraint checking to transaction end"
    pg_specific: true

notes:
  prerequisites:
    - "No explicit requirements"
  restrictions:
    - "Cannot BEGIN inside existing transaction"
  best_practices:
    - "Use READ ONLY for query-only transactions"
    - "Keep transactions short to avoid blocking"

examples:
  basic:
    - title: "Simple transaction"
      code: |
        BEGIN;
        UPDATE accounts SET balance = balance - 100 WHERE id = 1;
        UPDATE accounts SET balance = balance + 100 WHERE id = 2;
        COMMIT;
      explanation: "Transfer funds in atomic transaction"
  advanced:
    - title: "Serializable transaction"
      code: |
        BEGIN ISOLATION LEVEL SERIALIZABLE READ ONLY DEFERRABLE;
        SELECT sum(balance) FROM accounts;
        COMMIT;
      explanation: "High isolation for financial reporting"

related_commands:
  - skillid: pg_commit
    relationship: "Commit transaction"
  - skillid: pg_rollback
    relationship: "Rollback transaction"
  - skillid: pg_start_transaction
    relationship: "Alternative transaction start"
  - skillid: pg_set_transaction
    relationship: "Set transaction characteristics"

compatibility:
  sql_standard: true
  notes: |
    SQL standard defines BEGIN TRANSACTION.
    PostgreSQL extension: DEFERRABLE option.

metadata:

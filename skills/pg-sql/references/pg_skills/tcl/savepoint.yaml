skillid: pg_savepoint
name: SAVEPOINT
category: TCL

description:
  brief: "Define a new savepoint within the current transaction"
  detailed: "SAVEPOINT establishes a new savepoint within the current transaction. Savepoints allow partial rollback of transactions."

syntax:
  primary: "SAVEPOINT savepoint_name"

key_parameters:
  - name: "savepoint_name"
    description: "Name for the savepoint"

notes:
  - "Use ROLLBACK TO SAVEPOINT to return to this point"
  - "Use RELEASE SAVEPOINT to discard"

examples:
  basic:
    - code: |
        BEGIN;
        SAVEPOINT my_savepoint;
        INSERT INTO users VALUES (1, 'test');
        ROLLBACK TO SAVEPOINT my_savepoint;
        COMMIT;

related_commands:
  - skillid: pg_rollback_to_savepoint
  - skillid: pg_release_savepoint

metadata:
  source_page: 1967
skillid: pg_set_session_authorization
name: SET SESSION AUTHORIZATION
category: TCL

description:
  brief: "设置当前会话的会话用户标识符和当前用户标识符"

syntax:
  primary: "SET [ SESSION | LOCAL ] SESSION AUTHORIZATION user_name\nSET [ SESSION | LOCAL ] SESSION AUTHORIZATION DEFAULT\nRESET SESSION AUTHORIZATION"

key_parameters:
  - name: "SESSION"
    description: "设置在整个会话期间有效"
  - name: "LOCAL"
    description: "设置仅在当前事务期间有效"
  - name: "user_name"
    description: "用户名称"
  - name: "DEFAULT"
    description: "重置为原始认证用户名"

related_commands:
  - "SET ROLE"

metadata:
  source_page: 2002
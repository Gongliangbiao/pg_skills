skillid: pg_commit
name: COMMIT
category: TCL
description: |
  Commit the current transaction. COMMIT commits the current transaction.
  All changes made by the transaction become visible to others and are
  guaranteed to be durable if a crash occurs.
syntax: |
  COMMIT [ WORK | TRANSACTION ] [ AND [ NO ] CHAIN ]
key_parameters:
  - name: WORK
    description: Optional key word. It has no effect.
  - name: TRANSACTION
    description: Optional key word. It has no effect.
  - name: AND CHAIN
    description: |
      If AND CHAIN is specified, a new transaction is immediately started
      with the same transaction characteristics (see SET TRANSACTION) as
      the just finished one. Otherwise, no new transaction is started.
notes:
  - Use ROLLBACK to abort a transaction.
  - Issuing COMMIT when not inside a transaction does no harm, but it will provoke a warning message.
  - COMMIT AND CHAIN when not inside a transaction is an error.
examples:
  - description: To commit the current transaction and make all changes permanent
    code: COMMIT;
compatibility: |
  The command COMMIT conforms to the SQL standard. The form COMMIT TRANSACTION
  is a PostgreSQL extension.
see_also:
  - BEGIN
  - ROLLBACK

skillid: pg_explain
name: EXPLAIN
category: Utility

description:
  brief: "Show the execution plan of a statement"
  detailed: |
    EXPLAIN shows the execution plan that the PostgreSQL planner generates
    for the supplied statement. The execution plan shows how the table(s)
    referenced by the statement will be scanned — by plain sequential scan,
    index scan, etc. — and if multiple tables are referenced, what join
    algorithms will be used.

    The most critical part of the display is the estimated statement execution
    cost, which is the planner's guess at how long it will take to run the
    statement.

syntax:
  primary: |
    EXPLAIN [ ( option [, ...] ) ] statement
    EXPLAIN [ ANALYZE ] [ VERBOSE ] statement

key_parameters:
  - name: "ANALYZE"
    type: "keyword"
    required: false
    description: "Actually execute the statement and show real run times"
  - name: "VERBOSE"
    type: "keyword"
    required: false
    description: "Display additional information about the plan"
  - name: "BUFFERS"
    type: "keyword"
    required: false
    pg_specific: true
    description: "Show buffer usage statistics (requires ANALYZE)"
  - name: "COSTS"
    type: "keyword"
    required: false
    description: "Include estimated costs for each plan node"
  - name: "SETTINGS"
    type: "keyword"
    required: false
    pg_specific: true
    description: "Include configuration parameters affecting the plan"
  - name: "FORMAT"
    type: "keyword"
    required: false
    description: "Output format: TEXT, JSON, YAML, XML"

options:
  - name: "ANALYZE"
    effect: "Execute statement and show actual times"
    warning: "Actually runs the statement, may modify data"
  - name: "VERBOSE"
    effect: "Show more details including schema qualification"
  - name: "BUFFERS"
    effect: "Show buffer hit/miss statistics"
    requires: "ANALYZE"
  - name: "TIMING"
    effect: "Include actual time per node"
    default: true
  - name: "SUMMARY"
    effect: "Include summary timing info"
  - name: "FORMAT { TEXT | JSON | YAML | XML }"
    effect: "Output format for machine processing"

notes:
  prerequisites:
    - "Must have appropriate privileges to execute the statement"
  restrictions:
    - "ANALYZE actually executes and may modify data"
  best_practices:
    - "Use ANALYZE for accurate timing"
    - "Use BUFFERS for I/O analysis"
    - "Use JSON/YAML format for automated analysis"
  warnings:
    - "EXPLAIN ANALYZE on INSERT/UPDATE/DELETE modifies data"

examples:
  basic:
    - title: "Simple explain"
      code: |
        EXPLAIN SELECT * FROM users WHERE email = 'test@example.com';
      explanation: "Show query plan without executing"
    - title: "Explain analyze"
      code: |
        EXPLAIN ANALYZE SELECT * FROM orders WHERE customer_id = 100;
      explanation: "Execute and show actual performance"
  advanced:
    - title: "Full analysis"
      code: |
        EXPLAIN (ANALYZE, BUFFERS, VERBOSE, FORMAT JSON)
        SELECT * FROM products JOIN categories ON products.cat_id = categories.id;
      explanation: "Detailed JSON output with buffer stats"
    - title: "Cost comparison"
      code: |
        EXPLAIN SELECT * FROM large_table WHERE indexed_col = 5;
        EXPLAIN SELECT * FROM large_table WHERE unindexed_col = 'value';
      explanation: "Compare indexed vs non-indexed query costs"

related_commands:
  - skillid: pg_analyze
    relationship: "Update table statistics for planner"
  - skillid: pg_select
    relationship: "Query data"

compatibility:
  sql_standard: false
  notes: |
    EXPLAIN is a PostgreSQL extension.
    Similar commands exist in other databases with different syntax.

metadata:
  source_page: 1899
  doc_version: "PostgreSQL 16.4"
  priority: high
  frequency: frequent
skillid: pg_import_foreign_schema
name: IMPORT FOREIGN SCHEMA
category: Utility

description:
  brief: "从外部服务器导入表定义"

syntax:
  primary: "IMPORT FOREIGN SCHEMA remote_schema\n    [ { LIMIT TO | EXCEPT } ( table_name [, ...] ) ]\n    FROM SERVER server_name\n    INTO local_schema\n    [ OPTIONS ( option 'value' [, ... ] ) ]"

key_parameters:
  - name: "remote_schema"
    description: "要从中导入的远程模式"
  - name: "LIMIT TO"
    description: "仅导入匹配给定表名的外部表"
  - name: "EXCEPT"
    description: "排除指定的外部表"
  - name: "server_name"
    description: "要从其中导入的外部服务器"
  - name: "local_schema"
    description: "导入的外部表将创建在其中的模式"

related_commands:
  - "CREATE FOREIGN TABLE"

metadata:
  source_page: 1915
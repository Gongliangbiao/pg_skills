skillid: pg_prepare
name: PREPARE
category: Utility

description:
  brief: "为执行准备一个语句"

syntax:
  primary: "PREPARE name [ ( data_type [, ...] ) ] AS statement"

key_parameters:
  - name: "name"
    description: "预备语句的名称"
  - name: "data_type"
    description: "参数的数据类型"
  - name: "statement"
    description: "SELECT、INSERT、UPDATE、DELETE、MERGE或VALUES语句"

related_commands:
  - "DEALLOCATE"
  - "EXECUTE"


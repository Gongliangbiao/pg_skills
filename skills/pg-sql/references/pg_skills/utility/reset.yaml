skillid: pg_reset
name: RESET
category: Utility

description:
  brief: "将运行时参数的值恢复为默认值"

syntax:
  primary: "RESET configuration_parameter\nRESET ALL"

key_parameters:
  - name: "configuration_parameter"
    description: "可设置的运行时参数的名称"
  - name: "ALL"
    description: "将所有可设置的运行时参数重置为默认值"

related_commands:
  - "SET"
  - "SHOW"

metadata:
  source_page: 1957
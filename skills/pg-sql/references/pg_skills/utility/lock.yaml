skillid: pg_lock
name: LOCK
category: Utility

description:
  brief: "锁定一个表"

syntax:
  primary: "LOCK [ TABLE ] [ ONLY ] name [ * ] [, ...] [ IN lockmode MODE ] [ NOWAIT ]\n\nwhere lockmode is one of:\n    ACCESS SHARE | ROW SHARE | ROW EXCLUSIVE | SHARE UPDATE EXCLUSIVE\n    | SHARE | SHARE ROW EXCLUSIVE | EXCLUSIVE | ACCESS EXCLUSIVE"

key_parameters:
  - name: "name"
    description: "要锁定的表的名称"
  - name: "lockmode"
    description: "锁模式"
  - name: "NOWAIT"
    description: "不等待锁释放"

related_commands:
  - "SET TRANSACTION"

metadata:
  source_page: 1928
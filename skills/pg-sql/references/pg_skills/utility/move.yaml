skillid: pg_move
name: MOVE
category: Utility

description:
  brief: "定位一个游标"

syntax:
  primary: "MOVE [ direction ] [ FROM | IN ] cursor_name\n\nwhere direction can be one of:\n    NEXT\n    PRIOR\n    FIRST\n    LAST\n    ABSOLUTE count\n    RELATIVE count\n    count\n    ALL\n    FORWARD\n    FORWARD count\n    FORWARD ALL\n    BACKWARD\n    BACKWARD count\n    BACKWARD ALL"

key_parameters:
  - name: "direction"
    description: "移动方向"
  - name: "cursor_name"
    description: "游标名称"
  - name: "count"
    description: "要移动的行数"

related_commands:
  - "CLOSE"
  - "DECLARE"
  - "FETCH"

metadata:
  source_page: 1937
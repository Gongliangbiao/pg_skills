skillid: pg_cluster
name: CLUSTER
category: Utility

description:
  brief: "Cluster a table according to an index"
  detailed: "CLUSTER physically reorders a table based on an index. Future inserts may not maintain ordering."

syntax:
  primary: |
    CLUSTER [ VERBOSE ] table_name [ USING index_name ]
    CLUSTER [ VERBOSE ] table_name [, ...]
    CLUSTER [ VERBOSE ]

key_parameters:
  - name: "VERBOSE"
    description: "Show progress information"
  - name: "USING index_name"
    description: "Specific index to cluster by"

notes:
  - "Requires ACCESS EXCLUSIVE lock"
  - "Can improve performance for index-heavy queries"
  - "May not persist ordering for new inserts"

examples:
  basic:
    - code: "CLUSTER users USING idx_users_email;"
    - code: "CLUSTER;"

related_commands:
  - skillid: pg_vacuum_full

metadata:

skillid: pg_set
name: SET
category: Utility

description:
  brief: "更改一个运行时参数"

syntax:
  primary: "SET [ SESSION | LOCAL ] configuration_parameter { TO | = } { value | 'value' | DEFAULT }\nSET [ SESSION | LOCAL ] TIME ZONE { value | 'value' | LOCAL | DEFAULT }"

key_parameters:
  - name: "SESSION"
    description: "设置在整个会话期间有效"
  - name: "LOCAL"
    description: "设置仅在当前事务期间有效"
  - name: "configuration_parameter"
    description: "可设置的运行时参数的名称"
  - name: "value"
    description: "参数的新值"

related_commands:
  - "RESET"
  - "SHOW"

metadata:
  source_page: 1996
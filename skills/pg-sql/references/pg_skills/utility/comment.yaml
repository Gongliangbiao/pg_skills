skillid: pg_comment
name: COMMENT
category: Utility

description:
  brief: "Define or change the comment of an object"
  detailed: "COMMENT stores a comment about a database object. Comments can be viewed with psql or standard catalog queries."

syntax:
  primary: |
    COMMENT ON
    { TABLE table_name | COLUMN table_name.column_name | ... }
    IS 'text'

notes:
  - "NULL comment removes existing comment"
  - "Useful for documentation"

examples:
  basic:
    - code: "COMMENT ON TABLE users IS 'User accounts table';"
    - code: "COMMENT ON COLUMN users.email IS 'Primary email address';"


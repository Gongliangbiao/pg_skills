skillid: pg_vacuum
name: VACUUM
category: Utility

description:
  brief: "Garbage-collect and optionally analyze a database"
  detailed: |
    VACUUM reclaims storage occupied by dead tuples. In normal PostgreSQL
    operation, tuples that are deleted or obsoleted by an update are not
    physically removed from their table; they remain present until a VACUUM
    is done.

    VACUUM ANALYZE performs a VACUUM and then an ANALYZE for each selected
    table. This is a convenient combination form for routine maintenance scripts.

    Plain VACUUM (without FULL) simply marks space as available for re-use.
    VACUUM FULL physically compacts the table and reclaims space.

syntax:
  primary: |
    VACUUM [ ( option [, ...] ) ] [ table_name [, ...] ] [ ( column_name [, ...] ) ]
    VACUUM [ FULL ] [ FREEZE ] [ VERBOSE ] [ ANALYZE ] [ table_name ]
            [ ( column_name [, ...] ) ]

  variants:
    - name: "Simple vacuum"
      syntax: "VACUUM table_name;"
    - name: "Vacuum analyze"
      syntax: "VACUUM ANALYZE table_name;"
    - name: "Full vacuum"
      syntax: "VACUUM FULL table_name;"

key_parameters:
  - name: "FULL"
    type: "keyword"
    required: false
    pg_specific: true
    description: "Rewrites entire table, reclaims maximum space, locks table"
  - name: "FREEZE"
    type: "keyword"
    required: false
    pg_specific: true
    description: "Freeze tuples aggressively for minimal maintenance"
  - name: "VERBOSE"
    type: "keyword"
    required: false
    description: "Print detailed progress information"
  - name: "ANALYZE"
    type: "keyword"
    required: false
    description: "Also update statistics for planner"
  - name: "table_name"
    type: "identifier"
    required: false
    description: "Specific table to vacuum. If omitted, all tables."
  - name: "column_name"
    type: "identifier"
    required: false
    description: "Specific columns for ANALYZE"

notes:
  prerequisites:
    - "Must have table ownership or VACUUM privilege"
  restrictions:
    - "VACUUM FULL requires exclusive lock"
    - "Cannot VACUUM system catalogs except in standalone mode"
  best_practices:
    - "Use autovacuum for regular maintenance"
    - "Avoid VACUUM FULL unless necessary"
    - "Use ANALYZE for statistics updates"
  warnings:
    - "VACUUM FULL locks the table and can take significant time"

examples:
  basic:
    - title: "Vacuum single table"
      code: |
        VACUUM users;
      explanation: "Reclaim space in users table"
    - title: "Vacuum and analyze"
      code: |
        VACUUM ANALYZE orders;
      explanation: "Reclaim space and update statistics"
  advanced:
    - title: "Full vacuum"
      code: |
        VACUUM FULL VERBOSE large_table;
      explanation: "Compact table completely with progress output"
    - title: "Parallel vacuum"
      code: |
        VACUUM (PARALLEL 4) big_table;
      explanation: "Use 4 workers for parallel vacuuming"

related_commands:
  - skillid: pg_analyze
    relationship: "Update statistics"
  - skillid: pg_reindex
    relationship: "Rebuild indexes"
  - skillid: pg_truncate
    relationship: "Quick table emptying"

compatibility:
  sql_standard: false
  notes: |
    VACUUM is a PostgreSQL extension.
    SQL standard does not define garbage collection commands.

metadata:
  source_page: 2019
  doc_version: "PostgreSQL 16.4"
  priority: high
  frequency: frequent
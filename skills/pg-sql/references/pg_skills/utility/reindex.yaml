skillid: pg_reindex
name: REINDEX
category: Utility

description:
  brief: "Rebuild indexes"
  detailed: "REINDEX rebuilds an index using data stored in the index's table, replacing old copies. Useful for corrupted indexes."

syntax:
  primary: |
    REINDEX [ ( option [, ...] ) ] { INDEX | TABLE | SCHEMA | DATABASE } [ CONCURRENTLY ] name

key_parameters:
  - name: "INDEX/TABLE/SCHEMA/DATABASE"
    description: "Type of object to reindex"
  - name: "CONCURRENTLY"
    pg_specific: true
    description: "Reindex without locking writes"
  - name: "TABLESPACE"
    pg_specific: true
    description: "Move indexes to new tablespace"

notes:
  - "CONCURRENTLY is slower but allows writes"
  - "Useful after corruption or major data changes"

examples:
  basic:
    - code: "REINDEX INDEX idx_users_email;"
    - code: "REINDEX TABLE users;"
    - code: "REINDEX DATABASE mydb CONCURRENTLY;"

related_commands:
  - skillid: pg_create_index
  - skillid: pg_vacuum

metadata:
  source_page: 1950
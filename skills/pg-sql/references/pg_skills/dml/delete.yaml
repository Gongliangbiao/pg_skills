skillid: pg_delete
name: DELETE
category: DML

description:
  brief: "Delete rows from a table"
  detailed: |
    DELETE deletes rows that satisfy the WHERE clause from the specified table.
    If the WHERE clause is absent, all rows in the table are deleted.
    The result is a valid, though empty, table.

    Triggers on DELETE will be executed for each row that is deleted.
    If any triggers fire, they might perform additional deletions.

syntax:
  primary: |
    [ WITH [ RECURSIVE ] with_query [, ...] ]
    DELETE FROM [ ONLY ] table_name [ * ] [ [ AS ] alias ]
    [ USING from_item [, ...] ]
    [ WHERE condition | WHERE CURRENT OF cursor_name ]
    [ RETURNING { * | output_expression [ [ AS ] output_name ] } [, ...] ]

key_parameters:
  - name: "table_name"
    type: "identifier"
    required: true
    description: "The name (optionally schema-qualified) of the table to delete from"
  - name: "USING"
    type: "clause"
    required: false
    description: "Allows referencing other tables in WHERE condition"
  - name: "WHERE condition"
    type: "clause"
    required: false
    description: "Only delete rows satisfying this condition"
  - name: "WHERE CURRENT OF cursor_name"
    type: "clause"
    required: false
    pg_specific: true
    description: "Delete row most recently fetched from cursor"
  - name: "RETURNING"
    type: "clause"
    required: false
    pg_specific: true
    description: "Returns deleted rows' values"

notes:
  prerequisites:
    - "Must have DELETE privilege on the table"
  restrictions:
    - "Cannot delete rows referenced by foreign keys unless CASCADE"
  best_practices:
    - "Always include WHERE clause to avoid deleting all rows"
    - "Consider TRUNCATE for faster deletion of all rows"
  warnings:
    - "DELETE without WHERE deletes ALL rows"

examples:
  basic:
    - title: "Delete specific rows"
      code: |
        DELETE FROM logs WHERE created_at < '2024-01-01';
      explanation: "Delete logs older than specified date"
    - title: "Delete with USING clause"
      code: |
        DELETE FROM orders USING customers
        WHERE orders.customer_id = customers.id
        AND customers.status = 'inactive';
      explanation: "Delete orders for inactive customers"
  advanced:
    - title: "Delete with RETURNING"
      code: |
        DELETE FROM users WHERE id = 5 RETURNING *;
      explanation: "Delete and return deleted row data"

related_commands:
  - skillid: pg_insert
    relationship: "Insert new rows"
  - skillid: pg_update
    relationship: "Update existing rows"
  - skillid: pg_truncate
    relationship: "Fast delete all rows"
  - skillid: pg_select
    relationship: "Query data"

compatibility:
  sql_standard: true
  notes: |
    SQL standard supports basic DELETE.
    PostgreSQL extensions: USING clause, RETURNING, WHERE CURRENT OF cursor.

metadata:
  source_page: 1839
  doc_version: "PostgreSQL 16.4"
  priority: high
  frequency: frequent
name: SELECT
description: 从表或视图中检索数据行
version: "16.4"
category: DML
pg_specific: false

syntax:
  primary: |
    [ WITH [ RECURSIVE ] with_query [, ...] ]
    SELECT [ ALL | DISTINCT [ ON ( expression [, ...] ) ] ]
    [ { * | expression [ [ AS ] output_name ] } [, ...] ]
    [ FROM from_item [, ...] ]
    [ WHERE condition ]
    [ GROUP BY [ ALL | DISTINCT ] grouping_element [, ...] ]
    [ HAVING condition ]
    [ WINDOW window_name AS ( window_definition ) [, ...] ]
    [ { UNION | INTERSECT | EXCEPT } [ ALL | DISTINCT ] select ]
    [ ORDER BY expression [ ASC | DESC | USING operator ]
      [ NULLS { FIRST | LAST } ] [, ...] ]
    [ LIMIT { count | ALL } ]
    [ OFFSET start [ ROW | ROWS ] ]
    [ FETCH { FIRST | NEXT } [ count ] { ROW | ROWS }
      { ONLY | WITH TIES } ]
    [ FOR { UPDATE | NO KEY UPDATE | SHARE | KEY SHARE }
      [ OF table_name [, ...] ] [ NOWAIT | SKIP LOCKED ] [...] ]
  variants:
    - name: "简单查询"
      syntax: "SELECT columns FROM table WHERE condition;"
    - name: "CTE查询"
      syntax: "WITH cte_name AS (...) SELECT ... FROM cte_name;"
    - name: "聚合查询"
      syntax: "SELECT agg_func(column) FROM table GROUP BY column HAVING condition;"

parameters:
  - name: WITH
    type: clause
    required: false
    pg_specific: false
    description: "定义公共表表达式(CTE)，可递归引用"
  - name: DISTINCT
    type: keyword
    required: false
    pg_specific: false
    description: "消除结果集中的重复行"
  - name: DISTINCT ON
    type: clause
    required: false
    pg_specific: true
    description: "保留每组匹配表达式的第一行（PG特有）"
  - name: FROM
    type: clause
    required: false
    pg_specific: false
    description: "指定数据源表、视图或子查询"
  - name: WHERE
    type: clause
    required: false
    pg_specific: false
    description: "筛选条件，过滤不满足条件的行"
  - name: GROUP BY
    type: clause
    required: false
    pg_specific: false
    description: "分组条件，将行聚合为匹配值的组"
  - name: HAVING
    type: clause
    required: false
    pg_specific: false
    description: "组筛选条件，消除不满足条件的组"
  - name: ORDER BY
    type: clause
    required: false
    pg_specific: false
    description: "排序条件，ASC升序/DESC降序"
  - name: LIMIT
    type: clause
    required: false
    pg_specific: true
    description: "限制返回的最大行数"
  - name: OFFSET
    type: clause
    required: false
    pg_specific: true
    description: "跳过指定行数后再返回结果"
  - name: FOR UPDATE/SHARE
    type: clause
    required: false
    pg_specific: true
    description: "锁定选中的行，防止并发修改"

options:
  - group: "锁定选项"
    items:
      - name: NOWAIT
        effect: "无法立即锁定时报错而非等待"
      - name: SKIP LOCKED
        effect: "跳过已被锁定的行"

examples:
  basic:
    - title: "简单查询"
      code: |
        SELECT id, name FROM users WHERE active = true;
      explanation: "查询活跃用户的id和name"
    - title: "排序和限制"
      code: |
        SELECT * FROM products ORDER BY price DESC LIMIT 10;
      explanation: "获取价格最高的10个产品"
  advanced:
    - title: "递归CTE查询层级"
      code: |
        WITH RECURSIVE org_tree AS (
          SELECT id, name, manager_id, 1 as level
          FROM employees WHERE manager_id IS NULL
          UNION ALL
          SELECT e.id, e.name, e.manager_id, t.level + 1
          FROM employees e
          JOIN org_tree t ON e.manager_id = t.id
        )
        SELECT * FROM org_tree ORDER BY level;
      explanation: "使用递归CTE查询组织层级结构"
    - title: "窗口函数"
      code: |
        SELECT id, name, department, salary,
               ROW_NUMBER() OVER (PARTITION BY department ORDER BY salary DESC) as rank,
               SUM(salary) OVER (PARTITION BY department) as dept_total
        FROM employees;
      explanation: "计算部门内排名和部门薪资总和"

notes:
  prerequisites:
    - "必须对每个引用列有SELECT权限"
  restrictions:
    - "FOR UPDATE需要UPDATE权限"
  best_practices:
    - "使用明确列名而非SELECT *"
    - "复杂查询使用WITH分解提高可读性"
    - "大结果集使用LIMIT避免资源耗尽"
  warnings:
    - "FOR UPDATE锁定会影响并发性能"

errors:
  - code: "column reference ambiguous"
    cause: "多表有同名列，未明确指定表"
    solution: "使用表名或别名限定列名"
  - code: "permission denied"
    cause: "无SELECT权限"
    solution: "GRANT SELECT ON table TO role"

related:
  - name: INSERT
    relationship: "插入数据"
  - name: UPDATE
    relationship: "更新数据"
  - name: SELECT INTO
    relationship: "创建表并填充查询结果"
  - name: VALUES
    relationship: "生成常量行集"

compatibility:
  sql_standard: true
  notes: "SQL标准支持基本SELECT。PG扩展：DISTINCT ON、TABLESAMPLE、LATERAL、窗口函数扩展"

metadata:
  source_page: 1972
  doc_version: "PostgreSQL 16.4"
  priority: high
  frequency: frequent
skillid: pg_values
name: VALUES
category: DML

description:
  brief: "计算一组行值"

syntax:
  primary: "VALUES ( expression [, ...] ) [, ...]\n    [ ORDER BY sort_expression [ ASC | DESC | USING operator ] [, ...] ]\n    [ LIMIT { count | ALL } ]\n    [ OFFSET start [ ROW | ROWS ] ]\n    [ FETCH { FIRST | NEXT } [ count ] { ROW | ROWS } ONLY ]"

key_parameters:
  - name: "expression"
    description: "计算并插入到结果表中的常量或表达式"
  - name: "sort_expression"
    description: "排序表达式或整数常量"
  - name: "operator"
    description: "排序操作符"
  - name: "count"
    description: "返回的最大行数"
  - name: "start"
    description: "开始返回行之前要跳过的行数"

related_commands:
  - "SELECT"
  - "INSERT"

metadata:
  source_page: 2024
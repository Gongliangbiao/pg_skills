skillid: pg_revoke
name: REVOKE
category: DCL

description:
  brief: "Remove access privileges"
  detailed: |
    REVOKE removes previously granted privileges. The REVOKE command is used
    to rescind specific privileges on a database object from one or more roles.

    Use GRANT OPTION FOR to remove the ability to grant the privilege to others,
    while keeping the privilege itself.

syntax:
  primary: |
    REVOKE [ GRANT OPTION FOR ]
    { { SELECT | INSERT | UPDATE | DELETE | TRUNCATE | REFERENCES | TRIGGER }
      [, ...] | ALL [ PRIVILEGES ] }
    ON { table_name [, ...] | ALL TABLES IN SCHEMA schema_name [, ...] }
    FROM { [ GROUP ] role_name | PUBLIC } [, ...]
    [ CASCADE | RESTRICT ]

key_parameters:
  - name: "GRANT OPTION FOR"
    type: "keyword"
    required: false
    description: "Remove grant option only, keep privilege"
  - name: "privilege"
    type: "keyword"
    required: true
    description: "Privilege to revoke (SELECT, INSERT, UPDATE, etc.)"
  - name: "ALL [ PRIVILEGES ]"
    type: "keyword"
    required: false
    description: "Revoke all privileges"
  - name: "ON object"
    type: "clause"
    required: true
    description: "Target object type and name"
  - name: "FROM role_name"
    type: "identifier"
    required: true
    description: "Role losing the privilege"
  - name: "PUBLIC"
    type: "keyword"
    required: false
    description: "Revoke privilege from all roles"
  - name: "CASCADE"
    type: "keyword"
    required: false
    description: "Automatically revoke dependent privileges"
  - name: "RESTRICT"
    type: "keyword"
    required: false
    description: "Fail if dependent privileges exist"

notes:
  prerequisites:
    - "Must own object or have appropriate privileges"
  best_practices:
    - "Use CASCADE to ensure complete cleanup"
  warnings:
    - "Revoking from PUBLIC affects all users"

examples:
  basic:
    - title: "Revoke table access"
      code: |
        REVOKE SELECT ON users FROM analyst_role;
      explanation: "Remove read access from analyst"
    - title: "Revoke all privileges"
      code: |
        REVOKE ALL PRIVILEGES ON TABLE orders FROM manager_role;
      explanation: "Remove all access"
  advanced:
    - title: "Revoke grant option only"
      code: |
        REVOKE GRANT OPTION FOR SELECT ON users FROM analyst_role;
      explanation: "Keep SELECT but remove ability to grant it"
    - title: "Revoke from PUBLIC"
      code: |
        REVOKE EXECUTE ON FUNCTION public_func() FROM PUBLIC;
      explanation: "Remove public access to function"

related_commands:
  - skillid: pg_grant
    relationship: "Grant privileges"
  - skillid: pg_alter_default_privileges
    relationship: "Modify default privileges"

compatibility:
  sql_standard: true
  notes: |
    SQL standard supports REVOKE.
    PostgreSQL extends with ALL TABLES/SEQUENCES/FUNCTIONS IN SCHEMA syntax.

metadata:
  source_page: 1958
  doc_version: "PostgreSQL 16.4"
  priority: high
  frequency: frequent